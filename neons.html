<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Project NEONS — Okuyama Taiki</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23000'/><circle cx='32' cy='32' r='18' fill='none' stroke='%23ff66aa' stroke-width='3' filter='url(%23g)'/><defs><filter id='g'><feGaussianBlur stdDeviation='2.5' result='b'/><feMerge><feMergeNode in='b'/><feMergeNode in='b'/><feMergeNode in='SourceGraphic'/></feMerge></filter></defs></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #080808;
  --border: rgba(255,255,255,0.07);
  --text: rgba(255,255,255,0.85);
  --dim: rgba(255,255,255,0.32);
  --panel-bg: rgba(10,10,10,0.94);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

body {
  font-family: 'Space Mono', monospace;
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── HEADER ── */
header {
  position: fixed;
  top: 10px; left: 14px;
  z-index: 20;
  pointer-events: none;
  text-align: left;
}
.h-main {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px; font-weight: 300;
  letter-spacing: 0.22em;
  color: rgba(255,255,255,0.35);
}
.h-main span {
  font-size: 9px; font-weight: 300;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.18);
  vertical-align: middle;
}
.h-byline {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px; font-weight: 300;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.18);
  margin-top: 1px;
}

/* ── FULLSCREEN CANVAS ── */
#canvas-area {
  position: fixed;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #2a2a2a;
}
#canvas { display: block; cursor: none; touch-action: none; }
#cursor-ring {
  position: fixed; pointer-events: none; z-index: 100;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.7);
  transform: translate(-50%, -50%);
  transition: width 0.1s, height 0.1s;
  mix-blend-mode: difference;
}

/* ── CANVAS SIZE (top center) ── */
#cv-tl {
  position: fixed;
  top: 14px; left: 50%;
  transform: translateX(-50%);
  z-index: 30;
}
#cv-tl select {
  font-family: 'Space Mono', monospace;
  font-size: 9px; padding: 4px 8px;
  background: rgba(0,0,0,0.6);
  border: 0.5px solid rgba(255,255,255,0.15); border-radius: 2px;
  color: rgba(255,255,255,0.5); letter-spacing: 0.1em;
  cursor: pointer; outline: none;
  -webkit-appearance: none;
}
#cv-tl select option { background: #111; }

/* ── UNDO / CLEAR (top right of canvas) ── */
#cv-tr {
  position: fixed;
  top: 10px; right: 14px;
  z-index: 30;
  display: flex; gap: 6px;
}

/* ── OVERLAY BUTTONS (shared style) ── */
.ov-btn {
  width: 38px; height: 38px;
  background: rgba(0,0,0,0.65);
  border: 0.5px solid rgba(255,255,255,0.15); border-radius: 50%;
  color: rgba(255,255,255,0.45); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.12s, color 0.12s;
}
.ov-btn:hover, .ov-btn:active {
  border-color: rgba(255,255,255,0.45); color: rgba(255,255,255,0.9);
}
.ov-btn.on { border-color: rgba(255,255,255,0.5); color: rgba(255,255,255,0.85); }
.ov-btn.running {
  border-color: rgba(255,255,255,0.5); color: rgba(255,255,255,0.85);
  animation: pulse 2s ease-in-out infinite;
}

/* ── BOTTOM-LEFT BUTTONS ── */
#bl-btns {
  position: fixed;
  bottom: 20px; left: 16px;
  z-index: 50;
  display: flex; flex-direction: column; gap: 8px; align-items: flex-start;
}

/* ── PANELS ── */
.slide-panel {
  position: fixed;
  z-index: 40;
  background: rgba(8,8,8,0.95);
  border: 0.5px solid var(--border);
  display: flex; flex-direction: column;
  transition: transform 0.26s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
}

/* INPUT panel: slides down from top-left */
#panel-input {
  top: 0; left: 0;
  width: 72px;
  max-height: 85dvh;
  border-radius: 0 0 8px 0;
  border-top: none; border-left: none;
  transform: translateY(-100%);
}
#panel-input.open { transform: translateY(0); }
#panel-input .panel-title { padding: 8px 0; text-align: center; letter-spacing: 0.1em; font-size: 7px; }
#panel-input .sec { padding: 10px 0; display: flex; flex-direction: column; align-items: center; }
#panel-input .lbl { font-size: 7px; letter-spacing: 0.12em; margin-bottom: 6px; text-align: center; }

/* OUTPUT panel: slides in from left, bottom-anchored */
#panel-output {
  bottom: 104px; left: 0;
  width: 72px;
  max-height: calc(70dvh - 104px);
  border-radius: 0 8px 8px 0;
  border-left: none;
  transform: translateX(-100%);
}
#panel-output.open { transform: translateX(0); }
#panel-output .panel-title { padding: 8px 0; text-align: center; letter-spacing: 0.1em; font-size: 7px; }
#panel-output .sec { padding: 10px 0; display: flex; flex-direction: column; align-items: center; gap: 4px; }
#panel-output .lbl { font-size: 7px; letter-spacing: 0.1em; margin-bottom: 4px; text-align: center; color: var(--dim); }

.panel-body {
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}
.panel-title {
  font-size: 8px; letter-spacing: 0.28em; color: rgba(255,255,255,0.2);
  padding: 10px 14px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}

.sec {
  padding: 12px 14px;
  border-bottom: 0.5px solid var(--border);
}
.sec:last-child { border-bottom: none; }
.lbl { font-size: 8px; letter-spacing: 0.2em; color: var(--dim); margin-bottom: 8px; }

/* Color dot buttons — vertical */
.cdot-btn {
  display: flex; align-items: center; justify-content: center;
  padding: 5px;
  border-radius: 2px;
  border: 0.5px solid transparent;
  cursor: pointer;
  transition: border-color 0.12s;
  width: 100%;
}
.cdot-btn:hover { border-color: rgba(255,255,255,0.15); }
.cdot-btn.active { border-color: rgba(255,255,255,0.5); }
.cdot-dot {
  width: 16px; height: 16px; border-radius: 50%;
  flex-shrink: 0;
}

/* Add color button */
.cdot-add {
  width: 28px; height: 28px; border-radius: 50%;
  background: transparent;
  border: 0.5px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.3);
  font-size: 16px; line-height: 1;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.12s, color 0.12s;
}
.cdot-add:hover { border-color: rgba(255,255,255,0.5); color: rgba(255,255,255,0.8); }

/* Toolbar button (output panel) */
.tb-btn {
  width: 48px; height: 48px; padding: 0; background: transparent;
  border: 0.5px solid rgba(255,255,255,0.12); border-radius: 50%;
  font-family: 'Space Mono', monospace;
  font-size: 8px; letter-spacing: 0.08em; color: var(--dim);
  cursor: pointer; transition: border-color 0.12s, color 0.12s;
  display: flex; align-items: center; justify-content: center;
}
.tb-btn:hover, .tb-btn:active { color: var(--text); border-color: rgba(255,255,255,0.3); }
.tb-btn.active { color: var(--text); border-color: rgba(255,255,255,0.52); }

/* Vertical range slider */
input[type=range][style*="vertical"] {
  -webkit-appearance: slider-vertical;
  appearance: slider-vertical;
}

/* Size buttons — vertical, dot only */
.size-btn {
  display: flex; align-items: center; justify-content: center;
  width: 48px; height: 48px; padding: 0; background: transparent;
  border: 0.5px solid rgba(255,255,255,0.1); border-radius: 50%;
  color: rgba(255,255,255,0.45);
  cursor: pointer; transition: border-color 0.12s, color 0.12s;
}
.size-btn:hover, .size-btn:active { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.3); }
.size-btn.active { color: rgba(255,255,255,0.9); border-color: rgba(255,255,255,0.52); }

.srow { display: flex; align-items: center; gap: 8px; }
.sval { font-size: 9px; color: var(--dim); min-width: 20px; text-align: right; }
input[type=range] {
  -webkit-appearance: none; flex: 1; height: 2px;
  background: rgba(255,255,255,0.14); outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: rgba(255,255,255,0.7); cursor: pointer;
}

/* NEON button */
#btn-neon {
  width: 52px; height: 52px; padding: 0; margin-bottom: 0;
  background: transparent;
  border: 0.5px solid rgba(255,255,255,0.18); border-radius: 50%;
  font-family: 'Space Mono', monospace;
  font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
  color: var(--dim); cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  display: flex; align-items: center; justify-content: center;
}
#btn-neon:hover { color: var(--text); border-color: rgba(255,255,255,0.4); }
#btn-neon.active { color: var(--text); border-color: rgba(255,255,255,0.55); }
#btn-neon.running {
  color: var(--text); border-color: rgba(255,255,255,0.55);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { border-color: rgba(255,255,255,0.28); }
  50% { border-color: rgba(255,255,255,0.7); }
}

.pat-btn {
  flex: 1; padding: 7px 0; background: transparent;
  border: 0.5px solid rgba(255,255,255,0.14); border-radius: 2px;
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 0.08em; color: var(--dim);
  cursor: pointer; transition: border-color 0.12s, color 0.12s;
}
.pat-btn:hover, .pat-btn:active { color: var(--text); border-color: rgba(255,255,255,0.3); }
.pat-btn.active { color: var(--text); border-color: rgba(255,255,255,0.52); }

.export-btn {
  width: 100%; padding: 9px 0; margin-bottom: 5px; background: transparent;
  border: 0.5px solid var(--border); border-radius: 2px;
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 0.1em; color: var(--dim); cursor: pointer;
  transition: border-color 0.12s, color 0.12s;
}
.export-btn:hover, .export-btn:active { border-color: rgba(255,255,255,0.28); color: var(--text); }

select {
  background: transparent; border: 0.5px solid var(--border); border-radius: 2px;
  color: var(--text); font-family: 'Space Mono', monospace;
  font-size: 9px; padding: 5px 7px; cursor: pointer; outline: none;
}
select option { background: #111; }

/* ── EXPORT PANEL (slides up from bottom-right) ── */
#panel-export {
  position: fixed;
  bottom: 0; right: 0;
  width: 200px;
  background: rgba(8,8,8,0.97);
  border: 0.5px solid var(--border);
  border-bottom: none; border-right: none;
  border-radius: 8px 0 0 0;
  z-index: 40;
  transform: translateY(100%);
  transition: transform 0.26s cubic-bezier(0.4,0,0.2,1);
}
#panel-export.open { transform: translateY(0); }
#panel-export .ep-title {
  font-size: 8px; letter-spacing: 0.28em; color: rgba(255,255,255,0.2);
  padding: 10px 14px; border-bottom: 0.5px solid var(--border);
}
#panel-export .ep-sec {
  padding: 10px 14px; border-bottom: 0.5px solid var(--border);
}
#panel-export .ep-sec:last-child { border-bottom: none; }
#panel-export .ep-lbl {
  font-size: 8px; letter-spacing: 0.18em; color: var(--dim); margin-bottom: 7px;
}
#panel-export select {
  width: 100%; font-size: 9px; padding: 5px 7px; margin-bottom: 0;
}
.ep-row { display: flex; align-items: center; gap: 8px; }
.ep-row input[type=number] {
  width: 52px; background: transparent;
  border: 0.5px solid var(--border); border-radius: 2px;
  color: var(--text); font-family: 'Space Mono', monospace;
  font-size: 10px; padding: 4px 6px; outline: none; text-align: center;
}
.ep-row span { font-size: 9px; color: var(--dim); }
.exp-btn {
  width: 100%; padding: 9px 0; margin-bottom: 5px;
  background: transparent; border: 0.5px solid var(--border); border-radius: 20px;
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 0.12em; color: var(--dim); cursor: pointer;
  transition: border-color 0.12s, color 0.12s;
}
.exp-btn:hover, .exp-btn:active { border-color: rgba(255,255,255,0.3); color: var(--text); }
.exp-btn:last-child { margin-bottom: 0; }

/* BG color swatches in input panel */
.bg-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer;
}
.bg-lbl {
  font-size: 6px; letter-spacing: 0.06em;
  color: rgba(255,255,255,0.25);
  font-family: 'Space Mono', monospace;
}
.bg-dot {
  width: 18px; height: 18px; border-radius: 50%;
  cursor: pointer; border: 1.5px solid transparent;
  flex-shrink: 0; transition: border-color 0.12s;
}
.bg-dot.active { border-color: rgba(255,255,255,0.7); }
</style>
</head>
<body>

<!-- LOGO (top right, small) -->
<header>
  <div class="h-main">Project NEONS <span>α ver.2.5</span></div>
  <span class="h-byline">by Okuyama Taiki</span>
</header>

<!-- FULLSCREEN CANVAS -->
<div id="canvas-area">
  <canvas id="canvas"></canvas>
</div>
<div id="cursor-ring"></div>

<!-- CANVAS SIZE (top center) -->
<div id="cv-tl">
  <select onchange="resizeCanvas(this.value)">
    <option value="1080,1920" selected>9:16</option>
    <option value="1080,1350">4:5</option>
    <option value="1080,1080">1:1</option>
    <option value="1920,1080">16:9</option>
    <option value="1080,566">1.91:1</option>
  </select>
</div>

<!-- UNDO / REDO / CLEAR / ZOOM RESET (top right) -->
<div id="cv-tr">
  <button class="ov-btn" onclick="undo()" title="Undo">
    <svg width="15" height="15" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 5h6a4 4 0 0 1 0 8H4"/><polyline points="2,2 2,5 5,5"/>
    </svg>
  </button>
  <button class="ov-btn" onclick="redo()" title="Redo" id="btn-redo">
    <svg width="15" height="15" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5H6a4 4 0 0 0 0 8h4"/><polyline points="12,2 12,5 9,5"/>
    </svg>
  </button>
  <button class="ov-btn" id="btn-zoom-reset" onclick="resetZoom()" title="ズームリセット">
    <svg width="15" height="15" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
      <circle cx="6" cy="6" r="4"/><line x1="9" y1="9" x2="13" y2="13"/>
      <line x1="4" y1="6" x2="8" y2="6"/><line x1="6" y1="4" x2="6" y2="8"/>
    </svg>
  </button>
  <button class="ov-btn" onclick="clearCanvas()" title="Clear">
    <svg width="15" height="15" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
      <line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/>
    </svg>
  </button>
</div>

<!-- BOTTOM-LEFT BUTTONS -->
<div id="bl-btns">
  <!-- INPUT button (pencil icon) — top of stack -->
  <button class="ov-btn" id="btn-input" onclick="toggleInput()" title="Input">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 2l3 3-7 7-4 1 1-4z"/>
      <path d="M9 4l3 3"/>
    </svg>
  </button>
  <!-- OUTPUT button (neon sign / lightning) — bottom -->
  <button class="ov-btn" id="btn-output" onclick="toggleOutput()" title="Output">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="9,1 2,9 7,9 7,15 14,7 9,7"/>
    </svg>
  </button>
</div>

<!-- INPUT PANEL (slides down from top-left) -->
<div id="panel-input" class="slide-panel">
  <div class="panel-title">INPUT</div>
  <div class="panel-body">
    <div class="sec">
      <div class="lbl">① COLOR</div>
      <div id="color-used" style="display:flex;flex-direction:column;gap:4px"></div>
      <div id="color-divider" style="display:none;width:24px;height:0.5px;background:rgba(255,255,255,0.1);margin:4px auto"></div>
      <div id="color-unused" style="display:flex;flex-direction:column;gap:4px"></div>
      <div style="margin-top:6px;display:flex;justify-content:center;position:relative">
        <button class="cdot-add" onclick="document.getElementById('color-picker-add').click()" title="色を追加">＋</button>
        <input type="color" id="color-picker-add" value="#ff0000"
          style="position:absolute;opacity:0;width:0;height:0;pointer-events:none"
          onchange="addColor(this.value)">
      </div>
    </div>
    <div class="sec">
      <div class="lbl">② SIZE</div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <button class="size-btn active" id="sz-s" onclick="setSize(10,this)">
          <span class="sz-dot" style="width:10px;height:10px;background:currentColor;border-radius:50%;display:inline-block;vertical-align:middle"></span>
        </button>
        <button class="size-btn" id="sz-m" onclick="setSize(20,this)">
          <span class="sz-dot" style="width:18px;height:18px;background:currentColor;border-radius:50%;display:inline-block;vertical-align:middle"></span>
        </button>
        <button class="size-btn" id="sz-l" onclick="setSize(30,this)">
          <span class="sz-dot" style="width:26px;height:26px;background:currentColor;border-radius:50%;display:inline-block;vertical-align:middle"></span>
        </button>
      </div>
    </div>
    <div class="sec">
      <div class="lbl">③ BG</div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:5px">
        <div class="bg-item">
          <div class="bg-dot active" data-bg="#000000" onclick="setBg(this)" style="background:#000;border-color:rgba(255,255,255,0.7)" title="BLACK"></div>
          <span class="bg-lbl">BLK</span>
        </div>
        <div class="bg-item">
          <div class="bg-dot" data-bg="#05050f" onclick="setBg(this)" style="background:#05050f" title="BLUE-BLACK"></div>
          <span class="bg-lbl">B-BK</span>
        </div>
        <div class="bg-item">
          <div class="bg-dot" data-bg="#0f0505" onclick="setBg(this)" style="background:#0f0505" title="RED-BLACK"></div>
          <span class="bg-lbl">R-BK</span>
        </div>
        <div class="bg-item">
          <div class="bg-dot" data-bg="#0a0a0a" onclick="setBg(this)" style="background:#0a0a0a" title="DARK GRAY"></div>
          <span class="bg-lbl">GRY</span>
        </div>
        <div class="bg-item" title="カスタムカラー">
          <input type="color" id="bg-picker" value="#000000"
            style="width:18px;height:18px;border:none;padding:0;background:transparent;cursor:pointer;border-radius:50%;overflow:hidden"
            onchange="setBgCustom(this.value)">
          <span class="bg-lbl">CST</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- OUTPUT PANEL (slides in from left, bottom-anchored) -->
<div id="panel-output" class="slide-panel">
  <div class="panel-title">OUT</div>
  <div class="panel-body">

    <div class="sec">
      <button id="btn-neon" onclick="toggleNeon()">NEON</button>
    </div>

    <div class="sec">
      <div class="lbl">PAT</div>
      <button class="tb-btn active" id="pat-3" onclick="setPattern(3)">×3</button>
      <button class="tb-btn" id="pat-2" onclick="setPattern(2)">×2</button>
      <button class="tb-btn" id="pat-1" onclick="setPattern(1)">×1</button>
    </div>

    <div class="sec">
      <div class="lbl">SPD</div>
      <input type="range" id="fl-slider" min="1" max="100" value="40" step="1"
        style="writing-mode:vertical-lr;direction:rtl;width:4px;height:80px;cursor:pointer;-webkit-appearance:slider-vertical"
        oninput="flickerSpeed=+this.value">
    </div>

    <div class="sec">
      <div class="lbl">FADE</div>
      <!-- LINEAR: diagonal -->
      <button class="tb-btn active" id="fade-linear" onclick="setFade('linear',this)" title="LINEAR — 直線">
        <svg width="28" height="14" viewBox="0 0 28 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <line x1="4" y1="11" x2="24" y2="3"/>
        </svg>
      </button>
      <!-- EASE: S-curve -->
      <button class="tb-btn" id="fade-ease" onclick="setFade('ease',this)" title="EASE — S字カーブ">
        <svg width="28" height="14" viewBox="0 0 28 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 11 C4 11 8 11 12 7 C16 3 20 3 24 3"/>
        </svg>
      </button>
      <!-- NONE: flat line -->
      <button class="tb-btn" id="fade-none" onclick="setFade('none',this)" title="NONE — 瞬時切替">
        <svg width="28" height="14" viewBox="0 0 28 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <line x1="4" y1="7" x2="24" y2="7"/>
          <line x1="14" y1="3" x2="14" y2="11" stroke-width="1" opacity="0.4"/>
        </svg>
      </button>
      <!-- SIN: sine wave -->
      <button class="tb-btn" id="fade-sin" onclick="setFade('sin',this)" title="SIN — サイン波">
        <svg width="28" height="14" viewBox="0 0 28 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7 C6 7 6 2 10 2 C14 2 14 12 18 12 C22 12 22 7 25 7"/>
        </svg>
      </button>
    </div>

  </div>
</div>

<!-- EXPORT BUTTON (bottom-right) -->
<button class="ov-btn" id="btn-export" onclick="toggleExport()"
  style="position:fixed;bottom:20px;right:16px;z-index:50" title="Export">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 2v9M4 8l4 4 4-4"/>
    <path d="M2 13h12"/>

<!-- EXPORT PANEL (slides up from bottom-right) -->
<div id="panel-export">
  <div class="ep-title">EXPORT</div>

  <div class="ep-sec">
    <div class="ep-lbl">DURATION</div>
    <div class="ep-row">
      <input type="number" id="export-sec" value="3" min="1" max="60" step="1">
      <span>sec</span>
    </div>
  </div>

  <div class="ep-sec">
    <button class="exp-btn" onclick="exportJPG()">↓ JPG</button>
    <button class="exp-btn" onclick="exportGIF()">↓ GIF</button>
    <button class="exp-btn" id="btn-mp4" onclick="exportMP4()">↓ MP4</button>
    <button class="exp-btn" id="btn-png-seq" onclick="exportPNGSeq()">↓ PNG連番</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script>
const CV = document.getElementById('canvas');
const ctx = CV.getContext('2d');
const area = document.getElementById('canvas-area');

let W = 1080, H = 1920, scale = 1;
let zoom = 1, panX = 0, panY = 0; // ピンチズーム用
let brushSize = 3, currentColor = '#ff2244', bgColor = '#000000';
let flickerSpeed = 40, glowIntensity = 100;
let fadeCurve = 'linear';
let drawing = false, glowApplied = false;
let shining = false, shineAF = null, shinePattern = 3;

let ALL_COLORS = ['#ff2244','#ff66aa','#bb44ff','#2299ff','#00ffaa','#ffee00','#ffffff'];

const colorStrokes = {
  '#ff2244':[], '#ff66aa':[], '#bb44ff':[],
  '#2299ff':[], '#00ffaa':[], '#ffee00':[], '#ffffff':[]
};
let drawLog = [], strokeId = 0;
let curStroke = [], strokeCol = '#ff2244';
let history = [];
let redoStack = [];

function makeDot(color) {
  const d = document.createElement('div');
  d.className = 'cdot-btn' + (color === currentColor ? ' active' : '');
  d.dataset.color = color;
  d.onclick = () => setColor(d);
  const dot = document.createElement('div');
  dot.className = 'cdot-dot';
  dot.style.background = color === '#ffffff' ? '#fff' : color;
  d.appendChild(dot);
  return d;
}

function updateColorPalette() {
  // 使用済み色：drawLogから順番に（重複なし）
  const usedColors = [];
  drawLog.forEach(e => { if (!usedColors.includes(e.color)) usedColors.push(e.color); });
  const unusedColors = ALL_COLORS.filter(c => !usedColors.includes(c));

  const usedEl = document.getElementById('color-used');
  const unusedEl = document.getElementById('color-unused');
  const divEl = document.getElementById('color-divider');

  usedEl.innerHTML = '';
  unusedEl.innerHTML = '';

  usedColors.forEach(c => usedEl.appendChild(makeDot(c)));
  unusedColors.forEach(c => unusedEl.appendChild(makeDot(c)));

  divEl.style.display = (usedColors.length > 0 && unusedColors.length > 0) ? 'block' : 'none';
}

function addColor(hex) {
  // 正規化（小文字）
  hex = hex.toLowerCase();
  // すでに存在する色はスキップ
  if (ALL_COLORS.includes(hex)) {
    setColor(document.querySelector(`.cdot-btn[data-color="${hex}"]`));
    return;
  }
  ALL_COLORS.push(hex);
  colorStrokes[hex] = [];
  currentColor = hex;
  updateColorPalette();
  // 追加した色をアクティブに
  const newDot = document.querySelector(`.cdot-btn[data-color="${hex}"]`);
  if (newDot) setColor(newDot);
}

function fit() {
  scale = Math.min(area.clientWidth / W, area.clientHeight / H, 1);
  CV.style.width  = Math.round(W * scale) + 'px';
  CV.style.height = Math.round(H * scale) + 'px';
  applyTransform();
  updateSizeDots();
}

function applyTransform() {
  CV.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
  CV.style.transformOrigin = 'center center';
}

function resetZoom() {
  zoom = 1; panX = 0; panY = 0;
  applyTransform();
}
function initCanvas() { CV.width = W; CV.height = H; fit(); fillBg(); }
function fillBg() { ctx.fillStyle = bgColor; ctx.fillRect(0,0,W,H); }

function resizeCanvas(val) {
  const [w,h] = val.split(',').map(Number);
  const snap = CV.toDataURL();
  W = w; H = h; CV.width = w; CV.height = h; fillBg();
  const img = new Image(); img.onload = () => ctx.drawImage(img,0,0); img.src = snap;
  // キャッシュサイズをリセット
  Object.keys(colorCache).forEach(k => delete colorCache[k]);
  fit();
}

function setColor(el) {
  document.querySelectorAll('.cdot-btn').forEach(r => r.classList.remove('active'));
  el.classList.add('active'); currentColor = el.dataset.color;
}
function setBg(el) {
  document.querySelectorAll('.bg-dot').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  bgColor = el.dataset.bg;
  document.getElementById('bg-picker').value = bgColor;
  redrawAll();
}
function setBgCustom(val) {
  document.querySelectorAll('.bg-dot').forEach(b => b.classList.remove('active'));
  bgColor = val; redrawAll();
}
function setSize(val, el) {
  brushSize = val;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  updateCursorSize();
}

function updateSizeDots() {
  // ブラシの●を画面上の実寸で表示
  const sizes = [10, 20, 30];
  const ids = ['sz-s', 'sz-m', 'sz-l'];
  ids.forEach((id, i) => {
    const btn = document.getElementById(id);
    if (!btn) return;
    const px = Math.round(sizes[i] * scale);
    const dot = btn.querySelector('.sz-dot');
    if (dot) { dot.style.width = px + 'px'; dot.style.height = px + 'px'; }
  });
}

function gpos(e) {
  const r = CV.getBoundingClientRect();
  const cl = e.touches ? e.touches[0] : e;
  // getBoundingClientRectはtransform後の実際の位置を返すのでそのまま割るだけ
  return {
    x: (cl.clientX - r.left) / (scale * zoom),
    y: (cl.clientY - r.top)  / (scale * zoom)
  };
}

CV.addEventListener('mousemove', e => {
  if (panDragging || !drawing) return;
  const p = gpos(e);
  if (curStroke.length > 0) drawStroke([curStroke[curStroke.length-1], p], strokeCol, brushSize, glowApplied, ctx);
  curStroke.push(p);
});
CV.addEventListener('mouseup', () => {
  if (panDragging || !drawing) return;
  drawing = false;
  if (curStroke.length > 1) {
    saveHist();
    const idx = colorStrokes[strokeCol].length;
    colorStrokes[strokeCol].push({ points:[...curStroke], size:brushSize });
    drawLog.push({ id:strokeId++, color:strokeCol, idx });
    rebuildCache(strokeCol);
    updateColorPalette();
  }
  curStroke = [];
});
CV.addEventListener('mouseleave', () => {
  if (!drawing) return;
  drawing = false;
  if (curStroke.length > 1) {
    saveHist();
    const idx = colorStrokes[strokeCol].length;
    colorStrokes[strokeCol].push({ points:[...curStroke], size:brushSize });
    drawLog.push({ id:strokeId++, color:strokeCol, idx });
    rebuildCache(strokeCol);
    updateColorPalette();
  }
  curStroke = [];
});

// ── TOUCH: ピンチズーム + 描画 ──
let pinching = false;
let pinchStartDist = 0, pinchStartZoom = 1;
let pinchStartPanX = 0, pinchStartPanY = 0;
let pinchMidX = 0, pinchMidY = 0;

function getTouchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}
function getTouchMid(e) {
  return {
    x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
    y: (e.touches[0].clientY + e.touches[1].clientY) / 2
  };
}

CV.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    pinching = true; drawing = false; curStroke = [];
    pinchStartDist = getTouchDist(e);
    pinchStartZoom = zoom;
    pinchStartPanX = panX; pinchStartPanY = panY;
    const mid = getTouchMid(e);
    pinchMidX = mid.x; pinchMidY = mid.y;
  } else if (e.touches.length === 1 && !pinching) {
    drawing = true; strokeCol = currentColor; curStroke = [gpos(e)];
  }
}, { passive: false });

CV.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    const dist = getTouchDist(e);
    const newZoom = Math.min(8, Math.max(0.5, pinchStartZoom * (dist / pinchStartDist)));
    const mid = getTouchMid(e);
    const dx = mid.x - pinchMidX;
    const dy = mid.y - pinchMidY;
    panX = pinchStartPanX + dx + (pinchMidX - area.clientWidth/2) * (pinchStartZoom - newZoom);
    panY = pinchStartPanY + dy + (pinchMidY - area.clientHeight/2) * (pinchStartZoom - newZoom);
    zoom = newZoom;
    applyTransform();
  } else if (e.touches.length === 1 && drawing && !pinching) {
    const p = gpos(e);
    if (curStroke.length > 0) drawStroke([curStroke[curStroke.length-1], p], strokeCol, brushSize, glowApplied, ctx);
    curStroke.push(p);
  }
}, { passive: false });

CV.addEventListener('touchend', e => {
  e.preventDefault();
  if (e.touches.length < 2) pinching = false;
  if (!drawing) return;
  drawing = false;
  if (curStroke.length > 1) {
    saveHist();
    const idx = colorStrokes[strokeCol].length;
    colorStrokes[strokeCol].push({ points:[...curStroke], size:brushSize });
    drawLog.push({ id:strokeId++, color:strokeCol, idx });
    rebuildCache(strokeCol);
    updateColorPalette();
  }
  curStroke = [];
}, { passive: false });

// ダブルタップでズームリセット
let lastTap = 0;
CV.addEventListener('touchstart', e => {
  if (e.touches.length !== 1) return;
  const now = Date.now();
  if (now - lastTap < 300) resetZoom();
  lastTap = now;
}, { passive: true });

function drawPath(c, pts) {
  c.beginPath(); c.moveTo(pts[0].x, pts[0].y);
  for (let i=1;i<pts.length;i++) c.lineTo(pts[i].x, pts[i].y);
}

function drawStroke(pts, color, size, glow, c, alphaMultiplier) {
  if (pts.length < 2) return;
  const mul = (alphaMultiplier !== undefined) ? alphaMultiplier : 1;
  c.save(); c.lineCap = 'round'; c.lineJoin = 'round';
  if (glow) {
    const gi = glowIntensity / 100;
    c.shadowColor = color; c.shadowBlur = size * 3 + gi * 24;
    c.strokeStyle = color; c.lineWidth = size;
    c.globalAlpha = (0.28 * gi + 0.05) * mul;
    drawPath(c, pts); c.stroke();
    c.shadowBlur = size * 1.5 + gi * 10;
    c.globalAlpha = (0.7 * gi + 0.15) * mul; c.lineWidth = size * 0.8;
    drawPath(c, pts); c.stroke();
    c.shadowColor = color; c.shadowBlur = size * 0.6; c.strokeStyle = color;
    c.globalAlpha = Math.min(0.95, (0.75 + gi * 0.2)) * mul;
    c.lineWidth = Math.max(0.8, size * 0.5);
    drawPath(c, pts); c.stroke();
  } else {
    c.strokeStyle = color; c.lineWidth = size;
    c.globalAlpha = mul; c.shadowBlur = 0;
    drawPath(c, pts); c.stroke();
  }
  c.restore();
}

// ── オフスクリーンキャッシュ ──
// 色ごとにオフスクリーンCanvasをキャッシュ
// tick()ではdrawImage+globalAlphaのみで合成 → 大量ストロークでも軽量
const colorCache = {}; // color -> OffscreenCanvas or HTMLCanvasElement

function getOrCreateCache(color) {
  if (!colorCache[color]) {
    const oc = document.createElement('canvas');
    oc.width = W; oc.height = H;
    colorCache[color] = oc;
  }
  // サイズが変わっていたら作り直す
  if (colorCache[color].width !== W || colorCache[color].height !== H) {
    colorCache[color].width = W;
    colorCache[color].height = H;
  }
  return colorCache[color];
}

function rebuildCache(color) {
  const oc = getOrCreateCache(color);
  const oc_ctx = oc.getContext('2d');
  oc_ctx.clearRect(0, 0, W, H);
  const strokes = drawLog
    .filter(e => e.color === color)
    .map(e => colorStrokes[e.color][e.idx])
    .filter(Boolean);
  strokes.forEach(s => drawStroke(s.points, color, s.size, true, oc_ctx, 1));
}

function rebuildAllCaches() {
  ALL_COLORS.forEach(c => { if (colorStrokes[c] && colorStrokes[c].length > 0) rebuildCache(c); });
}

function redrawAll(withGlow) {
  ctx.fillStyle = bgColor; ctx.fillRect(0,0,W,H);
  if (withGlow || glowApplied) {
    // キャッシュから合成（alpha=1で全色描画）
    rebuildAllCaches();
    drawLog.forEach(e => {}); // drawLogの順序でなくキャッシュを色順で合成
    ALL_COLORS.forEach(col => {
      const strokes = drawLog.filter(e => e.color === col);
      if (!strokes.length) return;
      const oc = colorCache[col];
      if (!oc) return;
      ctx.save(); ctx.globalAlpha = 1; ctx.drawImage(oc, 0, 0); ctx.restore();
    });
  } else {
    drawLog.forEach(e => {
      const s = colorStrokes[e.color][e.idx];
      if (s) drawStroke(s.points, e.color, s.size, false, ctx);
    });
  }
}

function saveHist() {
  history.push({ strokes: JSON.parse(JSON.stringify(colorStrokes)), log: drawLog.map(e=>({...e})) });
  if (history.length > 30) history.shift();
  redoStack = [];
  updateRedoBtn();
}
function undo() {
  if (!history.length) return;
  redoStack.push({ strokes: JSON.parse(JSON.stringify(colorStrokes)), log: drawLog.map(e=>({...e})) });
  const p = history.pop();
  Object.keys(colorStrokes).forEach(k => { colorStrokes[k] = p.strokes[k] || []; });
  drawLog = p.log;
  Object.keys(colorCache).forEach(k => { const oc = colorCache[k]; if(oc) { oc.getContext('2d').clearRect(0,0,W,H); } });
  redrawAll(); updateRedoBtn(); updateColorPalette();
}
function redo() {
  if (!redoStack.length) return;
  history.push({ strokes: JSON.parse(JSON.stringify(colorStrokes)), log: drawLog.map(e=>({...e})) });
  const p = redoStack.pop();
  Object.keys(colorStrokes).forEach(k => { colorStrokes[k] = p.strokes[k] || []; });
  drawLog = p.log;
  Object.keys(colorCache).forEach(k => { const oc = colorCache[k]; if(oc) { oc.getContext('2d').clearRect(0,0,W,H); } });
  redrawAll(); updateRedoBtn(); updateColorPalette();
}
function updateRedoBtn() {
  const btn = document.getElementById('btn-redo');
  if (btn) btn.style.opacity = redoStack.length ? '1' : '0.3';
}
function setFade(val, el) {
  fadeCurve = val;
  document.querySelectorAll('[id^="fade-"]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}
function clearCanvas() {
  saveHist();
  Object.keys(colorStrokes).forEach(k => { colorStrokes[k] = []; });
  drawLog = []; stopShine(); glowApplied = false;
  updateNeonBtn(); fillBg(); updateColorPalette();
}

// ── NEON + SHINE 統合ボタン ──
function toggleNeon() {
  if (!glowApplied) {
    // OFF→ON: グロー適用 & SHINE開始
    glowApplied = true;
    redrawAll(true);
    startShine();
  } else if (!shining) {
    // グロー ON、SHINE OFF → SHINE再開
    startShine();
  } else {
    // グロー ON、SHINE ON → 全OFF
    glowApplied = false;
    stopShine();
    redrawAll(false);
  }
  updateNeonBtn();
}

function updateNeonBtn() {
  const btn = document.getElementById('btn-neon');
  btn.classList.remove('active', 'running');
  if (glowApplied && shining) btn.classList.add('running');
  else if (glowApplied) btn.classList.add('active');
}

function setPattern(n) {
  shinePattern = n;
  document.querySelectorAll('.pat-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pat-' + n).classList.add('active');
  if (shining) { stopShine(); startShine(); }
}

// Fade curve適用
function applyFade(phase) {
  switch(fadeCurve) {
    case 'none':   return phase < 0.5 ? 1 : 0;
    case 'linear': return 1 - phase;
    case 'sin':    return Math.sin(phase * Math.PI);
    case 'ease':   return phase < 0.5 ? 2*phase*phase : 1 - Math.pow(-2*phase+2,2)/2;
    default:       return Math.sin(phase * Math.PI);
  }
}
function calcMul(inCur, inNext, phase) {
  const dim = 0.25;
  if (inCur && inNext)  return 0.94;
  if (inCur && !inNext) return dim + (0.94 - dim) * Math.max(0, applyFade(phase));
  if (!inCur && inNext) return dim + (0.94 - dim) * Math.max(0, applyFade(1 - phase));
  return dim;
}

function getUsedColors() {
  const seen = new Set(), result = [];
  drawLog.forEach(e => { if (!seen.has(e.color)) { seen.add(e.color); result.push(e.color); } });
  return result;
}

function startShine() {
  const allColors = getUsedColors();
  if (allColors.length === 0) return;
  shining = true; updateNeonBtn();

  // キャッシュを事前構築
  allColors.forEach(c => rebuildCache(c));

  const n = allColors.length;
  let seq = [];
  if (shinePattern === 1) {
    allColors.forEach(c => seq.push(new Set([c])));
  } else if (shinePattern === 2) {
    for (let i=0;i<n;i++) seq.push(new Set([allColors[i], allColors[(i+1)%n]]));
  } else {
    allColors.forEach(c => { const s = new Set(allColors); s.delete(c); seq.push(s); });
  }

  const S = seq.length;
  let step = 0, frame = 0;
  function fpg() { return Math.max(1, Math.round(50 * Math.pow(1 - flickerSpeed / 100, 1.4))); }

  function tick() {
    if (!shining) return;
    const period = fpg(), phase = frame / period;
    const curSet = seq[step], nextSet = seq[(step+1) % S];

    ctx.fillStyle = bgColor; ctx.fillRect(0,0,W,H);

    // キャッシュ画像をglobalAlphaで合成するだけ → ストローク数に依存しない
    allColors.forEach(col => {
      const oc = colorCache[col]; if (!oc) return;
      const inCur = curSet.has(col), inNext = nextSet.has(col);
      const mul = calcMul(inCur, inNext, phase);
      if (mul < 0.01) return;
      ctx.save(); ctx.globalAlpha = mul; ctx.drawImage(oc, 0, 0); ctx.restore();
    });

    frame++;
    if (frame >= period) { frame = 0; step = (step+1) % S; }
    shineAF = requestAnimationFrame(tick);
  }
  tick();
}

function stopShine() {
  shining = false;
  if (shineAF) { cancelAnimationFrame(shineAF); shineAF = null; }
  updateNeonBtn();
  redrawAll(glowApplied);
}

function exportFilename(ext) {
  const now = new Date();
  const y = now.getFullYear();
  const mo = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const h = String(now.getHours()).padStart(2,'0');
  const mi = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  return `NEONS_${y}${mo}${d}_${h}${mi}${s}.${ext}`;
}

function exportJPG() {
  const was = shining; if (was) stopShine();
  redrawAll(glowApplied);
  const a = document.createElement('a');
  a.download = exportFilename('jpg');
  a.href = CV.toDataURL('image/jpeg', 0.95); a.click();
  if (was) startShine();
}

function exportGIF() {
  if (drawLog.length === 0) return;
  const was = shining; if (was) stopShine();
  const allColors = getUsedColors(), n = allColors.length;
  let seq = [];
  if (shinePattern === 1) allColors.forEach(c => seq.push(new Set([c])));
  else if (shinePattern === 2) for (let i=0;i<n;i++) seq.push(new Set([allColors[i],allColors[(i+1)%n]]));
  else allColors.forEach(c => { const s=new Set(allColors); s.delete(c); seq.push(s); });
  const S = seq.length;
  const fpg = Math.max(1, Math.round(50 * Math.pow(1 - flickerSpeed/100, 1.4)));
  const totalF = fpg * S;
  const gif = new GIF({
    workers:2, quality:8,
    width: Math.round(W*0.5), height: Math.round(H*0.5),
    workerScript: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'
  });
  const tmp = document.createElement('canvas');
  tmp.width = Math.round(W*0.5); tmp.height = Math.round(H*0.5);
  const tc = tmp.getContext('2d');
  function getCSF(color) { return drawLog.filter(e=>e.color===color).map(e=>colorStrokes[e.color][e.idx]).filter(Boolean); }
  for (let f=0;f<totalF;f++) {
    const step = Math.floor(f/fpg) % S, phase = (f%fpg)/fpg;
    const curSet = seq[step], nextSet = seq[(step+1)%S];
    tc.fillStyle = bgColor; tc.fillRect(0,0,tmp.width,tmp.height);
    tc.save(); tc.scale(0.5,0.5);
    allColors.forEach(col => {
      const strokes = getCSF(col); if (!strokes.length) return;
      const inCur = curSet.has(col), inNext = nextSet.has(col);
      const mul = calcMul(inCur, inNext, phase);
      strokes.forEach(s => drawStroke(s.points, col, s.size, true, tc, Math.max(0.03,mul)));
    });
    tc.restore();
    gif.addFrame(tmp, { delay: Math.round(1000/24), copy:true });
  }
  gif.on('finished', blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.download=exportFilename('gif'); a.href=url; a.click();
    if (was) startShine();
  });
  gif.render();
}

function exportMP4() {
  if (drawLog.length === 0) return;
  const mimeTypes = ['video/mp4;codecs=h264','video/mp4','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
  const supported = mimeTypes.find(m => MediaRecorder.isTypeSupported(m));
  if (!supported) { alert('MP4/WebM非対応ブラウザです。GIFをご利用ください。'); return; }

  const ext = supported.startsWith('video/mp4') ? 'mp4' : 'webm';
  const btn = document.getElementById('btn-mp4');
  btn.textContent = '● REC';
  const secInput = document.getElementById('export-sec');
  const durationMs = (parseFloat(secInput ? secInput.value : 3) || 3) * 1000;

  const fps = 30;
  const stream = CV.captureStream(fps);
  const chunks = [];
  const recorder = new MediaRecorder(stream, { mimeType: supported, videoBitsPerSecond: 8000000 });
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: supported.split(';')[0] });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.download = exportFilename(ext);
    a.href = url; a.click();
    URL.revokeObjectURL(url);
    btn.textContent = '↓ MP4';
    stopShine();
  };
  glowApplied = true;
  recorder.start();
  startShine();
  setTimeout(() => recorder.stop(), durationMs + 200);
}

async function exportPNGSeq() {
  if (drawLog.length === 0) return;
  const btn = document.getElementById('btn-png-seq');
  btn.textContent = '生成中...';

  const secInput = document.getElementById('export-sec');
  const durationSec = parseFloat(secInput ? secInput.value : 3) || 3;
  const fps = 24;
  const totalFrames = Math.round(durationSec * fps);

  const allColors = getUsedColors(), n = allColors.length;
  let seq = [];
  if (shinePattern === 1) allColors.forEach(c => seq.push(new Set([c])));
  else if (shinePattern === 2) for (let i=0;i<n;i++) seq.push(new Set([allColors[i],allColors[(i+1)%n]]));
  else allColors.forEach(c => { const s=new Set(allColors); s.delete(c); seq.push(s); });
  const S = seq.length;
  const fpg = Math.max(1, Math.round(50 * Math.pow(1 - flickerSpeed/100, 1.4)));
  const totalSeqFrames = fpg * S;

  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const tc = tmp.getContext('2d');

  function getCSF(color) { return drawLog.filter(e=>e.color===color).map(e=>colorStrokes[e.color][e.idx]).filter(Boolean); }

  for (let f = 0; f < totalFrames; f++) {
    const seqF = f % totalSeqFrames;
    const step = Math.floor(seqF / fpg) % S;
    const phase = (seqF % fpg) / fpg;
    const curSet = seq[step], nextSet = seq[(step+1)%S];

    tc.fillStyle = bgColor; tc.fillRect(0,0,W,H);
    allColors.forEach(col => {
      const strokes = getCSF(col); if (!strokes.length) return;
      const inCur = curSet.has(col), inNext = nextSet.has(col);
      const mul = calcMul(inCur, inNext, phase);
      strokes.forEach(s => drawStroke(s.points, col, s.size, true, tc, Math.max(0.03, mul)));
    });

    await new Promise(r => {
      tmp.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.download = exportFilename('').replace('.','') + '_' + String(f).padStart(4,'0') + '.png';
        a.href = url; a.click();
        URL.revokeObjectURL(url);
        setTimeout(r, 80); // ダウンロード間隔
      }, 'image/png');
    });
  }
  btn.textContent = '↓ PNG連番';
}

// ── EXPORT PANEL ──
let exportOpen = false;
function toggleExport() {
  exportOpen = !exportOpen;
  document.getElementById('panel-export').classList.toggle('open', exportOpen);
  document.getElementById('btn-export').classList.toggle('on', exportOpen);
  // 他パネルを閉じる
  if (exportOpen) {
    inputOpen = false; outputOpen = false;
    document.getElementById('panel-input').classList.remove('open');
    document.getElementById('panel-output').classList.remove('open');
    document.getElementById('btn-input').classList.remove('on');
    document.getElementById('btn-output').classList.remove('on');
  }
}

// ── PANEL UI ──
let inputOpen = false, outputOpen = false;

function toggleInput() {
  inputOpen = !inputOpen;
  if (inputOpen) { outputOpen = false; exportOpen = false; }
  document.getElementById('panel-input').classList.toggle('open', inputOpen);
  document.getElementById('panel-output').classList.toggle('open', outputOpen);
  document.getElementById('panel-export').classList.toggle('open', exportOpen);
  document.getElementById('btn-input').classList.toggle('on', inputOpen);
  document.getElementById('btn-output').classList.toggle('on', outputOpen);
  document.getElementById('btn-export').classList.toggle('on', exportOpen);
}

function toggleOutput() {
  outputOpen = !outputOpen;
  if (outputOpen) { inputOpen = false; exportOpen = false; }
  document.getElementById('panel-output').classList.toggle('open', outputOpen);
  document.getElementById('panel-input').classList.toggle('open', inputOpen);
  document.getElementById('panel-export').classList.toggle('open', exportOpen);
  document.getElementById('btn-output').classList.toggle('on', outputOpen);
  document.getElementById('btn-input').classList.toggle('on', inputOpen);
  document.getElementById('btn-export').classList.toggle('on', exportOpen);
}

// ── マウスホイールズーム（デスクトップ） ──
area.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newZoom = Math.min(8, Math.max(0.5, zoom * delta));
  // マウス位置を中心にズーム
  const rect = area.getBoundingClientRect();
  const mx = e.clientX - rect.left - area.clientWidth / 2;
  const my = e.clientY - rect.top - area.clientHeight / 2;
  panX += mx * (zoom - newZoom);
  panY += my * (zoom - newZoom);
  zoom = newZoom;
  applyTransform();
}, { passive: false });
// ── キーボードショートカット ──
let spaceDown = false;
let panDragging = false;
let panStartX = 0, panStartY = 0, panStartPanX = 0, panStartPanY = 0;

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) {
    e.preventDefault(); undo();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'z' && e.shiftKey) {
    e.preventDefault(); redo();
  }
  if (e.code === 'Space' && !e.repeat) {
    e.preventDefault();
    spaceDown = true;
    CV.style.cursor = 'grab';
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') {
    spaceDown = false;
    panDragging = false;
    CV.style.cursor = 'none';
  }
});

// スペース+ドラッグでパン
CV.addEventListener('mousedown', e => {
  if (spaceDown) {
    panDragging = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panStartPanX = panX; panStartPanY = panY;
    CV.style.cursor = 'grabbing';
    return;
  }
  drawing = true; strokeCol = currentColor; curStroke = [gpos(e)];
});

document.addEventListener('mouseup', e => {
  if (panDragging) {
    panDragging = false;
    CV.style.cursor = spaceDown ? 'grab' : 'none';
  }
});

const cursorRing = document.getElementById('cursor-ring');
cursorRing.style.opacity = '0';

function updateCursorSize() {
  const px = Math.max(4, brushSize * scale * zoom);
  cursorRing.style.width  = px + 'px';
  cursorRing.style.height = px + 'px';
}

document.addEventListener('mousemove', e => {
  if (panDragging) {
    panX = panStartPanX + (e.clientX - panStartX);
    panY = panStartPanY + (e.clientY - panStartY);
    applyTransform();
  }
  cursorRing.style.left = e.clientX + 'px';
  cursorRing.style.top  = e.clientY + 'px';
  updateCursorSize();
});
CV.addEventListener('mouseenter', () => { cursorRing.style.opacity = '1'; });
CV.addEventListener('mouseleave', () => { cursorRing.style.opacity = '0'; });

window.addEventListener('resize', fit);
initCanvas();
updateRedoBtn();
updateColorPalette();
</script>
