<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #080808;
  --border: rgba(255,255,255,0.07);
  --text: rgba(255,255,255,0.85);
  --dim: rgba(255,255,255,0.32);
  --panel-bg: rgba(10,10,10,0.94);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

body {
  font-family: 'Space Mono', monospace;
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── HEADER ── */
header {
  position: fixed;
  top: 10px; left: 14px;
  z-index: 20;
  pointer-events: none;
  text-align: left;
}
.h-main {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px; font-weight: 300;
  letter-spacing: 0.22em;
  color: rgba(255,255,255,0.35);
}
.h-main span {
  font-size: 9px; font-weight: 300;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.18);
  vertical-align: middle;
}
.h-byline {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px; font-weight: 300;
  letter-spacing: 0.12em;
  color: rgba(255,255,255,0.18);
  margin-top: 1px;
}

/* ── FULLSCREEN CANVAS ── */
#canvas-area {
  position: fixed;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: #2a2a2a;
}
#canvas { display: block; cursor: none; touch-action: none; }
#cursor-ring {
  position: fixed; pointer-events: none; z-index: 100;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.7);
  transform: translate(-50%, -50%);
  transition: width 0.1s, height 0.1s;
  mix-blend-mode: difference;
}

/* ── CANVAS SIZE (top center) ── */
#cv-tl {
  position: fixed;
  top: 14px; left: 50%;
  transform: translateX(-50%);
  z-index: 30;
}
#cv-tl select {
  font-family: 'Space Mono', monospace;
  font-size: 9px; padding: 4px 8px;
  background: rgba(0,0,0,0.6);
  border: 0.5px solid rgba(255,255,255,0.15); border-radius: 2px;
  color: rgba(255,255,255,0.5); letter-spacing: 0.1em;
  cursor: pointer; outline: none;
  -webkit-appearance: none;
}
#cv-tl select option { background: #111; }

/* ── TOP RIGHT BUTTONS ── */
#cv-tr {
  position: fixed;
  top: 10px; right: 14px;
  z-index: 30;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}
#cv-tr-row {
  display: flex; gap: 6px;
}
#cv-tr-col {
  display: flex; flex-direction: column; gap: 6px;
  align-items: flex-end;
}

/* ── OVERLAY BUTTONS (shared style) ── */
.ov-btn {
  width: 38px; height: 38px;
  background: rgba(0,0,0,0.65);
  border: 0.5px solid rgba(255,255,255,0.15); border-radius: 50%;
  color: rgba(255,255,255,0.45); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.12s, color 0.12s;
}
.ov-btn:hover, .ov-btn:active {
  border-color: rgba(255,255,255,0.45); color: rgba(255,255,255,0.9);
}
.ov-btn.on { border-color: rgba(255,255,255,0.5); color: rgba(255,255,255,0.85); }
.ov-btn.running {
  border-color: rgba(255,255,255,0.5); color: rgba(255,255,255,0.85);
  animation: pulse 2s ease-in-out infinite;
}

/* ── BOTTOM-LEFT BUTTONS ── */
#bl-btns {
  position: fixed;
  bottom: 20px; left: 16px;
  z-index: 50;
  display: flex; flex-direction: column; gap: 8px; align-items: flex-start;
}

/* ── PANELS ── */
.slide-panel {
  position: fixed;
  z-index: 40;
  background: rgba(8,8,8,0.95);
  border: 0.5px solid var(--border);
  display: flex; flex-direction: column;
  transition: transform 0.26s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
}

/* INPUT panel: slides down from top-left */
#panel-input {
  top: 0; left: 0;
  width: 72px;
  max-height: 85dvh;
  border-radius: 0 0 8px 0;
  border-top: none; border-left: none;
  transform: translateY(-100%);
}
#panel-input.open { transform: translateY(0); }
#panel-input .panel-title { padding: 8px 0; text-align: center; letter-spacing: 0.1em; font-size: 7px; }
#panel-input .sec { padding: 10px 0; display: flex; flex-direction: column; align-items: center; }
#panel-input .lbl { font-size: 7px; letter-spacing: 0.12em; margin-bottom: 6px; text-align: center; }

/* OUTPUT panel: slides in from left, bottom-anchored */
#panel-output {
  top: 0; bottom: 104px; left: 0;
  width: 72px;
  max-height: none;
  border-radius: 0 0 8px 0;
  border-top: none; border-left: none;
  transform: translateX(-100%);
}
#panel-output.open { transform: translateX(0); }
#panel-output .panel-title { padding: 8px 0; text-align: center; letter-spacing: 0.1em; font-size: 7px; }
#panel-output .sec { padding: 10px 0; display: flex; flex-direction: column; align-items: center; gap: 4px; }
#panel-output .lbl { font-size: 7px; letter-spacing: 0.1em; margin-bottom: 4px; text-align: center; color: var(--dim); }

.panel-body {
  overflow-y: auto;
  flex: 1;
  -webkit-overflow-scrolling: touch;
}
.panel-title {
  font-size: 8px; letter-spacing: 0.28em; color: rgba(255,255,255,0.2);
  padding: 10px 14px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}

.sec {
  padding: 12px 14px;
  border-bottom: 0.5px solid var(--border);
}
.sec:last-child { border-bottom: none; }
.lbl { font-size: 8px; letter-spacing: 0.2em; color: var(--dim); margin-bottom: 8px; }

/* Color dot buttons — vertical */
.cdot-btn {
  display: flex; align-items: center; justify-content: center;
  padding: 5px;
  border-radius: 2px;
  border: 0.5px solid transparent;
  cursor: pointer;
  transition: border-color 0.12s;
  width: 100%;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}
.cdot-btn:hover { border-color: rgba(255,255,255,0.15); }
.cdot-btn.active { border-color: rgba(255,255,255,0.5); }
.cdot-dot {
  width: 16px; height: 16px; border-radius: 50%;
  flex-shrink: 0;
}

/* Add color button */
.cdot-add {
  width: 28px; height: 28px; border-radius: 50%;
  background: transparent;
  border: 0.5px solid rgba(255,255,255,0.18);
  color: rgba(255,255,255,0.3);
  font-size: 16px; line-height: 1;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.12s, color 0.12s;
}
.cdot-add:hover { border-color: rgba(255,255,255,0.5); color: rgba(255,255,255,0.8); }

/* Toolbar button (output panel) */
.tb-btn {
  width: 48px; height: 48px; padding: 0; background: transparent;
  border: 0.5px solid rgba(255,255,255,0.12); border-radius: 50%;
  font-family: 'Space Mono', monospace;
  font-size: 8px; letter-spacing: 0.08em; color: var(--dim);
  cursor: pointer; transition: border-color 0.12s, color 0.12s;
  display: flex; align-items: center; justify-content: center;
}
.tb-btn:hover, .tb-btn:active { color: var(--text); border-color: rgba(255,255,255,0.3); }
.tb-btn.active { color: var(--text); border-color: rgba(255,255,255,0.52); }

/* Vertical range slider */
input[type=range][style*="vertical"] {
  -webkit-appearance: slider-vertical;
  appearance: slider-vertical;
}

/* Size buttons — vertical, dot only */
.size-btn {
  display: flex; align-items: center; justify-content: center;
  width: 48px; height: 48px; padding: 0; background: transparent;
  border: 0.5px solid rgba(255,255,255,0.1); border-radius: 50%;
  color: rgba(255,255,255,0.45);
  cursor: pointer; transition: border-color 0.12s, color 0.12s;
}
.size-btn:hover, .size-btn:active { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.3); }
.size-btn.active { color: rgba(255,255,255,0.9); border-color: rgba(255,255,255,0.52); }

.srow { display: flex; align-items: center; gap: 8px; }
.sval { font-size: 9px; color: var(--dim); min-width: 20px; text-align: right; }
input[type=range] {
  -webkit-appearance: none; flex: 1; height: 2px;
  background: rgba(255,255,255,0.14); outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: rgba(255,255,255,0.7); cursor: pointer;
}

/* NEON button */
#btn-neon {
  width: 52px; height: 52px; padding: 0; margin-bottom: 0;
  background: transparent;
  border: 0.5px solid rgba(255,255,255,0.18); border-radius: 50%;
  font-family: 'Space Mono', monospace;
  font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
  color: var(--dim); cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  display: flex; align-items: center; justify-content: center;
}
#btn-neon:hover { color: var(--text); border-color: rgba(255,255,255,0.4); }
#btn-neon.active { color: var(--text); border-color: rgba(255,255,255,0.55); }
#btn-neon.running {
  color: var(--text); border-color: rgba(255,255,255,0.55);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { border-color: rgba(255,255,255,0.28); }
  50% { border-color: rgba(255,255,255,0.7); }
}

.pat-btn {
  flex: 1; padding: 7px 0; background: transparent;
  border: 0.5px solid rgba(255,255,255,0.14); border-radius: 2px;
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 0.08em; color: var(--dim);
  cursor: pointer; transition: border-color 0.12s, color 0.12s;
}
.pat-btn:hover, .pat-btn:active { color: var(--text); border-color: rgba(255,255,255,0.3); }
.pat-btn.active { color: var(--text); border-color: rgba(255,255,255,0.52); }

.export-btn {
  width: 100%; padding: 9px 0; margin-bottom: 5px; background: transparent;
  border: 0.5px solid var(--border); border-radius: 2px;
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 0.1em; color: var(--dim); cursor: pointer;
  transition: border-color 0.12s, color 0.12s;
}
.export-btn:hover, .export-btn:active { border-color: rgba(255,255,255,0.28); color: var(--text); }

/* ── 3D VIEW ── */
#view-3d {
  position: fixed; inset: 0; z-index: 150;
  background: #000;
  display: none;
  pointer-events: none;
}
#view-3d.open { display: block; pointer-events: auto; }
#canvas-3d { position: absolute; inset: 0; display: block; }

#btn-3d-exit {
  position: absolute; bottom: 18px; left: 16px; z-index: 10;
  background: rgba(0,0,0,0.65);
  border: 0.5px solid rgba(255,255,255,0.15); border-radius: 50%;
  color: rgba(255,255,255,0.45); cursor: pointer;
  width: 38px; height: 38px;
  font-family: 'Space Mono', monospace;
  font-size: 8px; font-weight: 700; letter-spacing: 0.12em;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.12s, color 0.12s;
}
#btn-3d-exit:hover { border-color: rgba(255,255,255,0.45); color: rgba(255,255,255,0.9); }

#hint-3d {
  position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%);
  font-size: 8px; letter-spacing: 0.16em; color: rgba(255,255,255,0.14);
  pointer-events: none; white-space: nowrap;
  font-family: 'Space Mono', monospace;
}
#loading-3d {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; letter-spacing: 0.24em; color: rgba(255,255,255,0.25);
  font-family: 'Space Mono', monospace;
  pointer-events: none;
}
#label-3d-strokes {
  position: absolute; top: 14px; left: 14px;
  font-size: 8px; letter-spacing: 0.18em; color: rgba(255,255,255,0.2);
  font-family: 'Cormorant Garamond', serif; font-weight: 300;
  pointer-events: none;
  line-height: 1.5;
}
#autorotate-toggle {
  position: absolute; bottom: 18px; right: 16px; z-index: 10;
  background: rgba(0,0,0,0.65);
  border: 0.5px solid rgba(255,255,255,0.15); border-radius: 50%;
  color: rgba(255,255,255,0.35); cursor: pointer;
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.12s, color 0.12s;
}
#autorotate-toggle.on { border-color: rgba(255,255,255,0.45); color: rgba(255,255,255,0.8); }
#autorotate-toggle:hover { border-color: rgba(255,255,255,0.35); color: rgba(255,255,255,0.7); }

/* モーションコントロール */
#motion-ctrl {
  position: absolute; bottom: 18px; right: 16px; z-index: 10;
  display: flex; flex-direction: column; align-items: flex-end; gap: 7px;
}
#motion-mode { display: flex; gap: 5px; }
.mot-btn {
  background: rgba(0,0,0,0.65);
  border: 0.5px solid rgba(255,255,255,0.14); border-radius: 2px;
  color: rgba(255,255,255,0.32); cursor: pointer;
  font-family: 'Space Mono', monospace; font-size: 7px;
  letter-spacing: 0.14em; padding: 5px 9px;
  transition: border-color 0.12s, color 0.12s;
}
.mot-btn:hover { border-color: rgba(255,255,255,0.35); color: rgba(255,255,255,0.8); }
.mot-btn.active { border-color: rgba(255,255,255,0.55); color: rgba(255,255,255,0.9); }
#motion-speed {
  display: flex; align-items: center; gap: 7px;
  background: rgba(0,0,0,0.65);
  border: 0.5px solid rgba(255,255,255,0.14); border-radius: 2px;
  padding: 5px 9px;
}
.mot-lbl {
  font-family: 'Space Mono', monospace; font-size: 7px;
  letter-spacing: 0.14em; color: rgba(255,255,255,0.32);
}
#motion-spd-slider {
  -webkit-appearance: none; width: 72px; height: 2px;
  background: rgba(255,255,255,0.18); outline: none; cursor: pointer;
}
#motion-spd-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  border-radius: 50%; background: rgba(255,255,255,0.65); cursor: pointer;
}

/* 3D エクスポートボタン群 */
#export-3d {
  position: absolute; top: 58px; right: 16px; z-index: 10;
  display: flex; flex-direction: column; gap: 5px;
}
.exp3d-btn {
  background: rgba(0,0,0,0.65);
  border: 0.5px solid rgba(255,255,255,0.15); border-radius: 20px;
  color: rgba(255,255,255,0.38); cursor: pointer;
  font-family: 'Space Mono', monospace; font-size: 8px;
  letter-spacing: 0.12em; padding: 6px 11px;
  transition: border-color 0.12s, color 0.12s;
  white-space: nowrap;
}
.exp3d-btn:hover { border-color: rgba(255,255,255,0.38); color: rgba(255,255,255,0.85); }
.exp3d-btn.on   { border-color: rgba(255,80,80,0.6);    color: rgba(255,120,120,0.9); }

select {
  background: transparent; border: 0.5px solid var(--border); border-radius: 2px;
  color: var(--text); font-family: 'Space Mono', monospace;
  font-size: 9px; padding: 5px 7px; cursor: pointer; outline: none;
}
select option { background: #111; }

/* ── EXPORT PANEL (slides up from bottom-right) ── */
#panel-export {
  position: fixed;
  bottom: 0; right: 0;
  width: 200px;
  background: rgba(8,8,8,0.97);
  border: 0.5px solid var(--border);
  border-bottom: none; border-right: none;
  border-radius: 8px 0 0 0;
  z-index: 40;
  transform: translateY(100%);
  transition: transform 0.26s cubic-bezier(0.4,0,0.2,1);
}
#panel-export.open { transform: translateY(0); }
#panel-export .ep-title {
  font-size: 8px; letter-spacing: 0.28em; color: rgba(255,255,255,0.2);
  padding: 10px 14px; border-bottom: 0.5px solid var(--border);
}
#panel-export .ep-sec {
  padding: 10px 14px; border-bottom: 0.5px solid var(--border);
}
#panel-export .ep-sec:last-child { border-bottom: none; }
#panel-export .ep-lbl {
  font-size: 8px; letter-spacing: 0.18em; color: var(--dim); margin-bottom: 7px;
}
#panel-export select {
  width: 100%; font-size: 9px; padding: 5px 7px; margin-bottom: 0;
}
.ep-row { display: flex; align-items: center; gap: 8px; }
.ep-row input[type=number] {
  width: 52px; background: transparent;
  border: 0.5px solid var(--border); border-radius: 2px;
  color: var(--text); font-family: 'Space Mono', monospace;
  font-size: 10px; padding: 4px 6px; outline: none; text-align: center;
}
.ep-row span { font-size: 9px; color: var(--dim); }
.exp-btn {
  width: 100%; padding: 9px 0; margin-bottom: 5px;
  background: transparent; border: 0.5px solid var(--border); border-radius: 20px;
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 0.12em; color: var(--dim); cursor: pointer;
  transition: border-color 0.12s, color 0.12s;
}
.exp-btn:hover, .exp-btn:active { border-color: rgba(255,255,255,0.3); color: var(--text); }
.exp-btn:last-child { margin-bottom: 0; }

/* BG color swatches in input panel */
.bg-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer;
}
.bg-lbl {
  font-size: 6px; letter-spacing: 0.06em;
  color: rgba(255,255,255,0.25);
  font-family: 'Space Mono', monospace;
}
.bg-dot {
  width: 18px; height: 18px; border-radius: 50%;
  cursor: pointer; border: 1.5px solid transparent;
  flex-shrink: 0; transition: border-color 0.12s;
}
.bg-dot.active { border-color: rgba(255,255,255,0.7); }
</style>
</head>
<body>

<!-- LOGO (top right, small) -->
<header>
  <div class="h-main">Project NEONS <span>α ver.2.5</span></div>
  <span class="h-byline">by Okuyama Taiki</span>
</header>

<!-- FULLSCREEN CANVAS -->
<div id="canvas-area">
  <canvas id="canvas"></canvas>
</div>
<div id="cursor-ring"></div>

<!-- CANVAS SIZE (top center) -->
<div id="cv-tl">
  <select onchange="resizeCanvas(this.value)">
    <option value="1080,1920" selected>9:16</option>
    <option value="1080,1350">4:5</option>
    <option value="1080,1080">1:1</option>
    <option value="1920,1080">16:9</option>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script>
const CV = document.getElementById('canvas');
const ctx = CV.getContext('2d');
const area = document.getElementById('canvas-area');

let W = 1080, H = 1920, scale = 1;
let zoom = 1, panX = 0, panY = 0; // ピンチズーム用
let brushSize = 3, currentColor = '#ff2244', bgColor = '#000000';
let flickerSpeed = 40, glowIntensity = 100;
let fadeCurve = 'linear';
let drawing = false, glowApplied = false;
let shining = false, shineAF = null, shinePattern = 3;

let ALL_COLORS = ['#ff2244','#ff66aa','#bb44ff','#2299ff','#00ffaa','#ffee00','#ffffff'];

const colorStrokes = {
  '#ff2244':[], '#ff66aa':[], '#bb44ff':[],
  '#2299ff':[], '#00ffaa':[], '#ffee00':[], '#ffffff':[]
};
let drawLog = [], strokeId = 0;
let curStroke = [], strokeCol = '#ff2244';
let history = [];
let redoStack = [];

let colorEditMode = false; // 後方互換のため残す
let _editingColor = null;

function updatePickerState() {
  const picker = document.getElementById('color-edit-picker');
  const icon = document.getElementById('color-wheel-icon');
  const enabled = !!_editingColor;
  if (picker) picker.style.pointerEvents = enabled ? 'auto' : 'none';
  if (icon) icon.style.opacity = enabled ? '1' : '0.2';
}

function onEditPickerInput(val) {
  const preview = document.getElementById('color-edit-preview');
  if (preview) preview.style.background = val;
  if (_editingColor) replaceColorPreview(_editingColor, val);
}

function onEditPickerChange(val) {
  if (_editingColor) {
    replaceColor(_editingColor, val);
    _editingColor = val;
  }
  currentColor = val;
  const picker = document.getElementById('color-edit-picker');
  const preview = document.getElementById('color-edit-preview');
  if (picker) picker.value = val;
  if (preview) preview.style.background = val;
}
let _scrollY = 0;

function lockScroll() {
  pickerOpen = true;
  CV.style.pointerEvents = 'none';
  _scrollY = window.scrollY;
  document.body.style.cssText += ';overflow:hidden!important;position:fixed;top:-' + _scrollY + 'px;left:0;right:0;touch-action:none';
}

function unlockScroll() {
  pickerOpen = false;
  CV.style.pointerEvents = 'auto';
  document.body.style.overflow = '';
  document.body.style.position = '';
  document.body.style.top = '';
  document.body.style.left = '';
  document.body.style.right = '';
  document.body.style.touchAction = '';
  window.scrollTo(0, _scrollY);
}

function makeDot(color, isUsed) {
  const d = document.createElement('div');
  d.className = 'cdot-btn' + (color === currentColor ? ' active' : '');
  d.dataset.color = color;
  d.onclick = () => {
    setColor(d);
    // ピッカーを選択色に同期
    const picker = document.getElementById('color-edit-picker');
    const preview = document.getElementById('color-edit-preview');
    if (picker) picker.value = color;
    if (preview) preview.style.background = color;
    _editingColor = isUsed ? color : null;
    updatePickerState();
  };
  const dot = document.createElement('div');
  dot.className = 'cdot-dot';
  dot.style.background = color;
  d.appendChild(dot);
  return d;
}

function replaceColorPreview(oldColor, newColor) {
  // DOM操作なし・履歴なし。キャンバスだけ更新してプレビュー
  newColor = newColor.toLowerCase();
  if (oldColor === newColor) return;

  // 一時的にdrawLogの色を置き換えてプレビュー描画
  drawLog.forEach(e => { if (e.color === oldColor) e.color = '__preview__'; });
  colorStrokes['__preview__'] = colorStrokes[oldColor] || [];

  // キャッシュを一時生成
  const oc = getOrCreateCache('__preview__');
  const oc_ctx = oc.getContext('2d');
  oc_ctx.clearRect(0, 0, W, H);
  const strokes = drawLog.filter(e => e.color === '__preview__').map(e => colorStrokes['__preview__'][e.idx]).filter(Boolean);
  strokes.forEach(s => drawStroke(s.points, newColor, s.size, true, oc_ctx, 1));

  ctx.fillStyle = bgColor; ctx.fillRect(0, 0, W, H);
  ALL_COLORS.forEach(col => {
    const c = col === oldColor ? '__preview__' : col;
    const cache = colorCache[c]; if (!cache) return;
    if (drawLog.filter(e => e.color === c).length === 0) return;
    ctx.save(); ctx.globalAlpha = 1; ctx.drawImage(cache, 0, 0); ctx.restore();
  });

  // 元に戻す
  drawLog.forEach(e => { if (e.color === '__preview__') e.color = oldColor; });
  delete colorStrokes['__preview__'];
  delete colorCache['__preview__'];
}

function replaceColor(oldColor, newColor) {
  newColor = newColor.toLowerCase();
  if (oldColor === newColor) return;
  if (ALL_COLORS.includes(newColor)) return; // 既存色との重複を避ける

  saveHist();

  // ALL_COLORSを置き換え
  const idx = ALL_COLORS.indexOf(oldColor);
  if (idx !== -1) ALL_COLORS[idx] = newColor;

  // colorStrokesのキーを移行
  colorStrokes[newColor] = colorStrokes[oldColor] || [];
  delete colorStrokes[oldColor];

  // colorCacheを移行
  if (colorCache[oldColor]) {
    colorCache[newColor] = colorCache[oldColor];
    delete colorCache[oldColor];
  }

  // drawLogの色を一括置換
  drawLog.forEach(e => { if (e.color === oldColor) e.color = newColor; });

  // 現在の選択色も更新
  if (currentColor === oldColor) currentColor = newColor;

  // キャッシュ再構築
  rebuildCache(newColor);
  redrawAll(glowApplied);
  updateColorPalette();
  saveToLocal();
}

function updateColorPalette() {
  // 使用済み色：drawLogから順番に（重複なし）
  const usedColors = [];
  drawLog.forEach(e => { if (!usedColors.includes(e.color)) usedColors.push(e.color); });
  const unusedColors = ALL_COLORS.filter(c => !usedColors.includes(c));

  const usedEl = document.getElementById('color-used');
  const unusedEl = document.getElementById('color-unused');
  const divEl = document.getElementById('color-divider');

  usedEl.innerHTML = '';
  unusedEl.innerHTML = '';

  usedColors.forEach(c => usedEl.appendChild(makeDot(c, true)));
  unusedColors.forEach(c => unusedEl.appendChild(makeDot(c, false)));

  divEl.style.display = (usedColors.length > 0 && unusedColors.length > 0) ? 'block' : 'none';
}

function addColor(hex) {
  // 正規化（小文字）
  hex = hex.toLowerCase();
  // すでに存在する色はスキップ
  if (ALL_COLORS.includes(hex)) {
    setColor(document.querySelector(`.cdot-btn[data-color="${hex}"]`));
    return;
  }
  ALL_COLORS.push(hex);
  colorStrokes[hex] = [];
  currentColor = hex;
  updateColorPalette();
  // 追加した色をアクティブに
  const newDot = document.querySelector(`.cdot-btn[data-color="${hex}"]`);
  if (newDot) setColor(newDot);
}

function fit() {
  scale = Math.min(area.clientWidth / W, area.clientHeight / H, 1);
  CV.style.width  = Math.round(W * scale) + 'px';
  CV.style.height = Math.round(H * scale) + 'px';
  applyTransform();
  updateSizeDots();
}

function applyTransform() {
  CV.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
  CV.style.transformOrigin = 'center center';
}

function resetZoom() {
  zoom = 1; panX = 0; panY = 0;
  applyTransform();
}
function initCanvas() { CV.width = W; CV.height = H; fit(); fillBg(); }
function fillBg() { ctx.fillStyle = bgColor; ctx.fillRect(0,0,W,H); }

function resizeCanvas(val) {
  const [w,h] = val.split(',').map(Number);
  const snap = CV.toDataURL();
  W = w; H = h; CV.width = w; CV.height = h; fillBg();
  const img = new Image(); img.onload = () => ctx.drawImage(img,0,0); img.src = snap;
  // キャッシュサイズをリセット
  Object.keys(colorCache).forEach(k => delete colorCache[k]);
  fit();
}

function setColor(el) {
  document.querySelectorAll('.cdot-btn').forEach(r => r.classList.remove('active'));
  el.classList.add('active'); currentColor = el.dataset.color;
}
function setBg(el) {
  document.querySelectorAll('.bg-dot').forEach(b => b.classList.remove('active'));

function updateSizeDots() {
  // ブラシの●を画面上の実寸で表示
  const sizes = [10, 20, 30];
  const ids = ['sz-s', 'sz-m', 'sz-l'];
  ids.forEach((id, i) => {
    const btn = document.getElementById(id);
    if (!btn) return;
    const px = Math.round(sizes[i] * scale);
    const dot = btn.querySelector('.sz-dot');
    if (dot) { dot.style.width = px + 'px'; dot.style.height = px + 'px'; }
  });
}

function gpos(e) {
  const r = CV.getBoundingClientRect();
  const cl = e.touches ? e.touches[0] : e;
  // getBoundingClientRectはtransform後の実際の位置を返すのでそのまま割るだけ
  return {
    x: (cl.clientX - r.left) / (scale * zoom),
    y: (cl.clientY - r.top)  / (scale * zoom)
  };
}

CV.addEventListener('mousemove', e => {
  if (panDragging || !drawing) return;
  const p = gpos(e);
  if (curStroke.length > 0) drawStroke([curStroke[curStroke.length-1], p], strokeCol, brushSize, glowApplied, ctx);
  curStroke.push(p);
});
CV.addEventListener('mouseup', () => {
  if (panDragging || !drawing) return;
  drawing = false;
  if (curStroke.length > 1) {
    saveHist();
    const idx = colorStrokes[strokeCol].length;
    colorStrokes[strokeCol].push({ points:[...curStroke], size:brushSize });
    drawLog.push({ id:strokeId++, color:strokeCol, idx });
    rebuildCache(strokeCol);
    updateColorPalette();
    saveToLocal();
  }
  curStroke = [];
});
CV.addEventListener('mouseleave', () => {
  if (!drawing) return;
  drawing = false;
  if (curStroke.length > 1) {
    saveHist();
    const idx = colorStrokes[strokeCol].length;
    colorStrokes[strokeCol].push({ points:[...curStroke], size:brushSize });
    drawLog.push({ id:strokeId++, color:strokeCol, idx });
    rebuildCache(strokeCol);
    updateColorPalette();
    saveToLocal();
  }
  curStroke = [];
});

// ── TOUCH: ピンチズーム + 描画 ──
let pinching = false;
let pinchStartDist = 0, pinchStartZoom = 1;
let pinchStartPanX = 0, pinchStartPanY = 0;
let pinchMidX = 0, pinchMidY = 0;

function getTouchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}
function getTouchMid(e) {
  return {
    x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
    y: (e.touches[0].clientY + e.touches[1].clientY) / 2
  };
}

CV.addEventListener('touchstart', e => {
  if (pickerOpen) return;
  e.preventDefault();
  if (e.touches.length === 2) {
    pinching = true; drawing = false; curStroke = [];
    pinchStartDist = getTouchDist(e);
    pinchStartZoom = zoom;
    pinchStartPanX = panX; pinchStartPanY = panY;
    const mid = getTouchMid(e);
    pinchMidX = mid.x; pinchMidY = mid.y;
  } else if (e.touches.length === 1 && !pinching) {
    if (spaceDown) {
      panDragging = true;
      panStartX = e.touches[0].clientX;
      panStartY = e.touches[0].clientY;
      panStartPanX = panX; panStartPanY = panY;
    } else {
      drawing = true; strokeCol = currentColor; curStroke = [gpos(e)];
    }
  }
}, { passive: false });

CV.addEventListener('touchmove', e => {
  if (pickerOpen) return;
  e.preventDefault();
  if (e.touches.length === 2) {
    const dist = getTouchDist(e);
    const newZoom = Math.min(8, Math.max(0.5, pinchStartZoom * (dist / pinchStartDist)));
    const mid = getTouchMid(e);
    const dx = mid.x - pinchMidX;
    const dy = mid.y - pinchMidY;
    panX = pinchStartPanX + dx + (pinchMidX - area.clientWidth/2) * (pinchStartZoom - newZoom);
    panY = pinchStartPanY + dy + (pinchMidY - area.clientHeight/2) * (pinchStartZoom - newZoom);
    zoom = newZoom;
    applyTransform();
  } else if (e.touches.length === 1 && panDragging) {
    panX = panStartPanX + (e.touches[0].clientX - panStartX);
    panY = panStartPanY + (e.touches[0].clientY - panStartY);
    applyTransform();
  } else if (e.touches.length === 1 && drawing && !pinching) {
    const p = gpos(e);
    if (curStroke.length > 0) drawStroke([curStroke[curStroke.length-1], p], strokeCol, brushSize, glowApplied, ctx);
    curStroke.push(p);
  }
}, { passive: false });

CV.addEventListener('touchend', e => {
  if (pickerOpen) return;
  e.preventDefault();
  if (e.touches.length < 2) pinching = false;
  if (panDragging) { panDragging = false; return; }
  if (!drawing) return;
  drawing = false;
  if (curStroke.length > 1) {
    saveHist();
    const idx = colorStrokes[strokeCol].length;
    colorStrokes[strokeCol].push({ points:[...curStroke], size:brushSize });
    drawLog.push({ id:strokeId++, color:strokeCol, idx });
    rebuildCache(strokeCol);
    updateColorPalette();
    saveToLocal();
  }
  curStroke = [];
}, { passive: false });

// ダブルタップでズームリセット
let lastTap = 0;
CV.addEventListener('touchstart', e => {
  if (e.touches.length !== 1) return;
  const now = Date.now();
  if (now - lastTap < 300) resetZoom();
  lastTap = now;
}, { passive: true });

function drawPath(c, pts) {
  c.beginPath(); c.moveTo(pts[0].x, pts[0].y);
  for (let i=1;i<pts.length;i++) c.lineTo(pts[i].x, pts[i].y);
}

function drawStroke(pts, color, size, glow, c, alphaMultiplier) {
  if (pts.length < 2) return;
  const mul = (alphaMultiplier !== undefined) ? alphaMultiplier : 1;
  c.save(); c.lineCap = 'round'; c.lineJoin = 'round';
  if (glow) {
    const gi = glowIntensity / 100;
    c.shadowColor = color; c.shadowBlur = size * 3 + gi * 24;
    c.strokeStyle = color; c.lineWidth = size;
    c.globalAlpha = (0.28 * gi + 0.05) * mul;
    drawPath(c, pts); c.stroke();
    c.shadowBlur = size * 1.5 + gi * 10;
    c.globalAlpha = (0.7 * gi + 0.15) * mul; c.lineWidth = size * 0.8;
    drawPath(c, pts); c.stroke();
    c.shadowColor = color; c.shadowBlur = size * 0.6; c.strokeStyle = color;
    c.globalAlpha = Math.min(0.95, (0.75 + gi * 0.2)) * mul;
    c.lineWidth = Math.max(0.8, size * 0.5);
    drawPath(c, pts); c.stroke();
  } else {
    c.strokeStyle = color; c.lineWidth = size;
    c.globalAlpha = mul; c.shadowBlur = 0;
    drawPath(c, pts); c.stroke();
  }
  c.restore();
}

// ── オフスクリーンキャッシュ ──
// 色ごとにオフスクリーンCanvasをキャッシュ
// tick()ではdrawImage+globalAlphaのみで合成 → 大量ストロークでも軽量
const colorCache = {}; // color -> OffscreenCanvas or HTMLCanvasElement

function getOrCreateCache(color) {
  if (!colorCache[color]) {
    const oc = document.createElement('canvas');
    oc.width = W; oc.height = H;
    colorCache[color] = oc;
  }
  // サイズが変わっていたら作り直す
  if (colorCache[color].width !== W || colorCache[color].height !== H) {
    colorCache[color].width = W;
    colorCache[color].height = H;
  }
  return colorCache[color];
}

function rebuildCache(color) {
  const oc = getOrCreateCache(color);
  const oc_ctx = oc.getContext('2d');
  oc_ctx.clearRect(0, 0, W, H);
  const strokes = drawLog
    .filter(e => e.color === color)
    .map(e => colorStrokes[e.color][e.idx])
    .filter(Boolean);
  strokes.forEach(s => drawStroke(s.points, color, s.size, true, oc_ctx, 1));
}

function rebuildAllCaches() {
  ALL_COLORS.forEach(c => { if (colorStrokes[c] && colorStrokes[c].length > 0) rebuildCache(c); });
}

function redrawAll(withGlow) {
  ctx.fillStyle = bgColor; ctx.fillRect(0,0,W,H);
  if (withGlow || glowApplied) {
    // キャッシュから合成（alpha=1で全色描画）
    rebuildAllCaches();
    drawLog.forEach(e => {}); // drawLogの順序でなくキャッシュを色順で合成
    ALL_COLORS.forEach(col => {
      const strokes = drawLog.filter(e => e.color === col);
      if (!strokes.length) return;
      const oc = colorCache[col];
      if (!oc) return;
      ctx.save(); ctx.globalAlpha = 1; ctx.drawImage(oc, 0, 0); ctx.restore();
    });
  } else {
    drawLog.forEach(e => {
      const s = colorStrokes[e.color][e.idx];
      if (s) drawStroke(s.points, e.color, s.size, false, ctx);
    });
  }
}

function saveHist() {
  history.push({ strokes: JSON.parse(JSON.stringify(colorStrokes)), log: drawLog.map(e=>({...e})) });
  if (history.length > 30) history.shift();
  redoStack = [];
  updateRedoBtn();
}
function undo() {
  if (!history.length) return;
  redoStack.push({ strokes: JSON.parse(JSON.stringify(colorStrokes)), log: drawLog.map(e=>({...e})) });
  const p = history.pop();
  Object.keys(colorStrokes).forEach(k => { colorStrokes[k] = p.strokes[k] || []; });
  drawLog = p.log;
  Object.keys(colorCache).forEach(k => { const oc = colorCache[k]; if(oc) { oc.getContext('2d').clearRect(0,0,W,H); } });
  redrawAll(); updateRedoBtn(); updateColorPalette();
}
function redo() {
  if (!redoStack.length) return;
  history.push({ strokes: JSON.parse(JSON.stringify(colorStrokes)), log: drawLog.map(e=>({...e})) });
  const p = redoStack.pop();
  Object.keys(colorStrokes).forEach(k => { colorStrokes[k] = p.strokes[k] || []; });
  drawLog = p.log;
  Object.keys(colorCache).forEach(k => { const oc = colorCache[k]; if(oc) { oc.getContext('2d').clearRect(0,0,W,H); } });
  redrawAll(); updateRedoBtn(); updateColorPalette();
}
function updateRedoBtn() {
  const btn = document.getElementById('btn-redo');
  if (btn) btn.style.opacity = redoStack.length ? '1' : '0.3';
}
function setFade(val, el) {
  fadeCurve = val;
  document.querySelectorAll('[id^="fade-"]').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}
function clearCanvas() {
  saveHist();
  Object.keys(colorStrokes).forEach(k => { colorStrokes[k] = []; });
  drawLog = []; stopShine(); glowApplied = false;
  updateNeonBtn(); fillBg(); updateColorPalette();
  localStorage.removeItem(SAVE_KEY);
}

// ── NEON + SHINE 統合ボタン ──
function toggleNeon() {
  if (!glowApplied) {
    // OFF→ON: グロー適用 & SHINE開始
    glowApplied = true;
    redrawAll(true);
    startShine();
  } else if (!shining) {
    // グロー ON、SHINE OFF → SHINE再開
    startShine();
  } else {
    // グロー ON、SHINE ON → 全OFF
    glowApplied = false;
    stopShine();
    redrawAll(false);
  }
  updateNeonBtn();
}

function updateNeonBtn() {
  const btn = document.getElementById('btn-neon');
  btn.classList.remove('active', 'running');
  if (glowApplied && shining) btn.classList.add('running');
  else if (glowApplied) btn.classList.add('active');
}

function setPattern(n) {
  shinePattern = n;
  document.querySelectorAll('.pat-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pat-' + n).classList.add('active');
  if (shining) { stopShine(); startShine(); }
}

// Fade curve適用
let _randomFade = 'linear';
let _randomLastStep = -1;

function applyFade(phase, step) {
  let curve = fadeCurve;
  if (curve === 'random') {
    // ステップが変わるたびにランダムで選択
    if (step !== _randomLastStep) {
      const options = ['linear', 'none', 'sin', 'ease'];
      _randomFade = options[Math.floor(Math.random() * options.length)];
      _randomLastStep = step;
    }
    curve = _randomFade;
  }
  switch(curve) {
    case 'none':   return phase < 0.5 ? 1 : 0;
    case 'linear': return 1 - phase;
    case 'sin':    return Math.sin(phase * Math.PI);
    case 'ease':   return phase < 0.5 ? 2*phase*phase : 1 - Math.pow(-2*phase+2,2)/2;
    default:       return 1 - phase;
  }
}
function calcMul(inCur, inNext, phase, step) {
  const dim = 0.25;
  if (inCur && inNext)  return 0.94;
  if (inCur && !inNext) return dim + (0.94 - dim) * Math.max(0, applyFade(phase, step));
  if (!inCur && inNext) return dim + (0.94 - dim) * Math.max(0, applyFade(1 - phase, step));
  return dim;
}

function getUsedColors() {
  const seen = new Set(), result = [];
  drawLog.forEach(e => { if (!seen.has(e.color)) { seen.add(e.color); result.push(e.color); } });
  return result;
}

function startShine() {
  const allColors = getUsedColors();
  if (allColors.length === 0) return;
  shining = true; updateNeonBtn();

  // キャッシュを事前構築
  allColors.forEach(c => rebuildCache(c));

  const n = allColors.length;
  let seq = [];
  if (shinePattern === 1) {
    allColors.forEach(c => seq.push(new Set([c])));
  } else if (shinePattern === 2) {
    for (let i=0;i<n;i++) seq.push(new Set([allColors[i], allColors[(i+1)%n]]));
  } else {
    allColors.forEach(c => { const s = new Set(allColors); s.delete(c); seq.push(s); });
  }

  const S = seq.length;
  let step = 0, frame = 0;
  function fpg() { return Math.max(1, Math.round(50 * Math.pow(1 - flickerSpeed / 100, 1.4))); }

  function tick() {
    if (!shining) return;
    const period = fpg(), phase = frame / period;
    const curSet = seq[step], nextSet = seq[(step+1) % S];

    ctx.fillStyle = bgColor; ctx.fillRect(0,0,W,H);

    // キャッシュ画像をglobalAlphaで合成するだけ → ストローク数に依存しない
    allColors.forEach(col => {
      const oc = colorCache[col]; if (!oc) return;
      const inCur = curSet.has(col), inNext = nextSet.has(col);
      const mul = calcMul(inCur, inNext, phase, step);
      if (mul < 0.01) return;
      ctx.save(); ctx.globalAlpha = mul; ctx.drawImage(oc, 0, 0); ctx.restore();
    });

    frame++;
    if (frame >= period) { frame = 0; step = (step+1) % S; }
    shineAF = requestAnimationFrame(tick);
  }
  tick();
}

function stopShine() {
  shining = false;
  if (shineAF) { cancelAnimationFrame(shineAF); shineAF = null; }
  updateNeonBtn();
  redrawAll(glowApplied);
}

function exportFilename(ext) {
  const now = new Date();
  const y = now.getFullYear();
  const mo = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const h = String(now.getHours()).padStart(2,'0');
  const mi = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  return `NEONS_${y}${mo}${d}_${h}${mi}${s}.${ext}`;
}

function exportJPG() {
  const was = shining; if (was) stopShine();
  redrawAll(glowApplied);
  const a = document.createElement('a');
  a.download = exportFilename('jpg');
  a.href = CV.toDataURL('image/jpeg', 0.95); a.click();
  if (was) startShine();
}

function exportGIF() {
  if (drawLog.length === 0) return;
  const was = shining; if (was) stopShine();
  const allColors = getUsedColors(), n = allColors.length;
  let seq = [];
  if (shinePattern === 1) allColors.forEach(c => seq.push(new Set([c])));
  else if (shinePattern === 2) for (let i=0;i<n;i++) seq.push(new Set([allColors[i],allColors[(i+1)%n]]));
  else allColors.forEach(c => { const s=new Set(allColors); s.delete(c); seq.push(s); });
  const S = seq.length;
  const fpg = Math.max(1, Math.round(50 * Math.pow(1 - flickerSpeed/100, 1.4)));
  const totalF = fpg * S;
  const gif = new GIF({
    workers:2, quality:8,
    width: Math.round(W*0.5), height: Math.round(H*0.5),
    workerScript: 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'
  });
  const tmp = document.createElement('canvas');
  tmp.width = Math.round(W*0.5); tmp.height = Math.round(H*0.5);
  const tc = tmp.getContext('2d');
  function getCSF(color) { return drawLog.filter(e=>e.color===color).map(e=>colorStrokes[e.color][e.idx]).filter(Boolean); }
  for (let f=0;f<totalF;f++) {
    const step = Math.floor(f/fpg) % S, phase = (f%fpg)/fpg;
    const curSet = seq[step], nextSet = seq[(step+1)%S];
    tc.fillStyle = bgColor; tc.fillRect(0,0,tmp.width,tmp.height);
    tc.save(); tc.scale(0.5,0.5);
    allColors.forEach(col => {
      const strokes = getCSF(col); if (!strokes.length) return;
      const inCur = curSet.has(col), inNext = nextSet.has(col);
      const mul = calcMul(inCur, inNext, phase, step);
      strokes.forEach(s => drawStroke(s.points, col, s.size, true, tc, Math.max(0.03,mul)));
    });
    tc.restore();
    gif.addFrame(tmp, { delay: Math.round(1000/24), copy:true });
  }
  gif.on('finished', blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.download=exportFilename('gif'); a.href=url; a.click();
    if (was) startShine();
  });
  gif.render();
}

function exportMP4() {
  if (drawLog.length === 0) return;
  const mimeTypes = ['video/mp4;codecs=h264','video/mp4','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
  const supported = mimeTypes.find(m => MediaRecorder.isTypeSupported(m));
  if (!supported) { alert('MP4/WebM非対応ブラウザです。GIFをご利用ください。'); return; }

  const ext = supported.startsWith('video/mp4') ? 'mp4' : 'webm';
  const btn = document.getElementById('btn-mp4');
  btn.textContent = '● REC';
  const secInput = document.getElementById('export-sec');
  const durationMs = (parseFloat(secInput ? secInput.value : 3) || 3) * 1000;

  const fps = 30;
  const stream = CV.captureStream(fps);
  const chunks = [];
  const recorder = new MediaRecorder(stream, { mimeType: supported, videoBitsPerSecond: 8000000 });
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: supported.split(';')[0] });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.download = exportFilename(ext);
    a.href = url; a.click();
    URL.revokeObjectURL(url);
    btn.textContent = '↓ MP4';
    stopShine();
  };
  glowApplied = true;
  recorder.start();
  startShine();
  setTimeout(() => recorder.stop(), durationMs + 200);
}

async function exportPNGSeq() {
  if (drawLog.length === 0) return;
  const btn = document.getElementById('btn-png-seq');
  btn.textContent = '生成中...';

  const secInput = document.getElementById('export-sec');
  const durationSec = parseFloat(secInput ? secInput.value : 3) || 3;
  const fps = 24;
  const totalFrames = Math.round(durationSec * fps);

  const allColors = getUsedColors(), n = allColors.length;
  let seq = [];
  if (shinePattern === 1) allColors.forEach(c => seq.push(new Set([c])));
  else if (shinePattern === 2) for (let i=0;i<n;i++) seq.push(new Set([allColors[i],allColors[(i+1)%n]]));
  else allColors.forEach(c => { const s=new Set(allColors); s.delete(c); seq.push(s); });
  const S = seq.length;
  const fpg = Math.max(1, Math.round(50 * Math.pow(1 - flickerSpeed/100, 1.4)));
  const totalSeqFrames = fpg * S;

  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const tc = tmp.getContext('2d');

  function getCSF(color) { return drawLog.filter(e=>e.color===color).map(e=>colorStrokes[e.color][e.idx]).filter(Boolean); }

  for (let f = 0; f < totalFrames; f++) {
    const seqF = f % totalSeqFrames;
    const step = Math.floor(seqF / fpg) % S;
    const phase = (seqF % fpg) / fpg;
    const curSet = seq[step], nextSet = seq[(step+1)%S];

    tc.fillStyle = bgColor; tc.fillRect(0,0,W,H);
    allColors.forEach(col => {
      const strokes = getCSF(col); if (!strokes.length) return;
      const inCur = curSet.has(col), inNext = nextSet.has(col);
      const mul = calcMul(inCur, inNext, phase, step);
      strokes.forEach(s => drawStroke(s.points, col, s.size, true, tc, Math.max(0.03, mul)));
    });

    await new Promise(r => {
      tmp.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.download = exportFilename('').replace('.','') + '_' + String(f).padStart(4,'0') + '.png';
        a.href = url; a.click();
        URL.revokeObjectURL(url);
        setTimeout(r, 80); // ダウンロード間隔
      }, 'image/png');
    });
  }
  btn.textContent = '↓ PNG連番';
}

let inputOpen = false, outputOpen = false;

function toggleInput() {

      drawLog: drawLog.map(e => ({...e})),

function loadFromLocal() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data || data.version !== 1) return false;

    // キャンバスサイズを復元
    W = data.W || 1080; H = data.H || 1920;
    CV.width = W; CV.height = H;
    // サイズセレクターを合わせる
    const sel = document.querySelector('#cv-tl select');
    if (sel) {
      const val = W + ',' + H;
      [...sel.options].forEach(o => { o.selected = (o.value === val); });
    }

    // 背景色を復元
    bgColor = data.bgColor || '#000000';
    document.querySelectorAll('.bg-dot').forEach(b => {
      b.classList.toggle('active', b.dataset.bg === bgColor);
    });

    // カラーを復元
    if (data.allColors) {
      data.allColors.forEach(c => {
        if (!ALL_COLORS.includes(c)) {
          ALL_COLORS.push(c);
          colorStrokes[c] = [];
        }
      });
    }

    // ストロークを復元
    Object.keys(colorStrokes).forEach(k => { colorStrokes[k] = []; });
    Object.keys(data.colorStrokes || {}).forEach(k => {
      colorStrokes[k] = data.colorStrokes[k] || [];
    });
    drawLog = data.drawLog || [];
    strokeId = data.strokeId || 0;

    return true;
  } catch(e) { return false; }
}

// ── Script-tag loader（file://でも動作） ────────────────────────
function _loadScript(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector('script[src="' + src + '"]')) { resolve(); return; }
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = () => reject(new Error('Failed to load: ' + src));
    document.head.appendChild(s);
  });
}

async function _load3DLibs() {
  if (_3dReady) return true;

// ── ① 点列スムージング（ラプラシアン） ────────────────────────────
// 描線の手ブレを除去して滑らかな曲線にする
// iterations回、各点を隣接点の平均に近づける（端点は固定）
function _smoothPoints(pts, iterations) {
  let p = pts.map(v => v.clone());
  for (let k = 0; k < iterations; k++) {
    const next = p.map(v => v.clone());
    for (let i = 1; i < p.length - 1; i++) {
      next[i].x = p[i-1].x * 0.25 + p[i].x * 0.5 + p[i+1].x * 0.25;
      next[i].y = p[i-1].y * 0.25 + p[i].y * 0.5 + p[i+1].y * 0.25;
      next[i].z = p[i-1].z * 0.25 + p[i].z * 0.5 + p[i+1].z * 0.25;
    }
    p = next;
  }
  return p;
}

// ── ② チューブ＋半球キャップ一体ジオメトリ ───────────────────────
function _buildTubeWithCaps(curve, tubeSeg, r, radSeg, capSegs) {
  capSegs = capSegs || 16;
  const frames = curve.computeFrenetFrames(tubeSeg, false);
  const pos = [], nor = [], aTbuf = [], idx = [];
  let vi = 0;

  function addVertex(x, y, z, nx, ny, nz, t) {
    pos.push(x, y, z); nor.push(nx, ny, nz); aTbuf.push(t !== undefined ? t : 0.0); return vi++;
  }

  // リング追加（球面法線: sin(phi)=放射方向, cos(phi)=軸方向）
  function addRing(cx, cy, cz, Nx, Ny, Nz, Bx, By, Bz, ringR, phi, atx, aty, atz) {
    const base = vi;
    const sp = Math.sin(phi), cp = Math.cos(phi);
    for (let j = 0; j < radSeg; j++) {
      const a = (j / radSeg) * Math.PI * 2;
      const cs = Math.cos(a), sn = Math.sin(a);
      const rx = cs*Nx+sn*Bx, ry = cs*Ny+sn*By, rz = cs*Nz+sn*Bz;
      const nx = rx*sp + atx*cp, ny = ry*sp + aty*cp, nz = rz*sp + atz*cp;
      const len = Math.sqrt(nx*nx+ny*ny+nz*nz) || 1;
      addVertex(cx+ringR*rx, cy+ringR*ry, cz+ringR*rz, nx/len, ny/len, nz/len);
    }
    return base;
  }

  function connectRings(b0, b1) {
    for (let j = 0; j < radSeg; j++) {
      const jn = (j+1) % radSeg;
      idx.push(b0+j, b1+j, b1+jn,  b0+j, b1+jn, b0+jn);
    }
  }

  // ── 始端キャップ: 極(縮退リング) → 赤道 ────────────────────────
  const p0 = curve.getPoint(0);
  const T0 = frames.tangents[0];
  const N0 = frames.normals[0], B0 = frames.binormals[0];

  // 極を「半径0の縮退リング」として追加 → pole fanが不要、巻き順問題を完全回避
  const polePos0 = { x: p0.x-T0.x*r, y: p0.y-T0.y*r, z: p0.z-T0.z*r };
  let degRing0 = vi;
  for (let j = 0; j < radSeg; j++)
    addVertex(polePos0.x, polePos0.y, polePos0.z, -T0.x, -T0.y, -T0.z, 0.0);

  let prevRing = degRing0;
  for (let i = 1; i <= capSegs; i++) {
    const phi   = (i / capSegs) * Math.PI * 0.5;
    const ringR = r * Math.sin(phi);
    const off   = r * Math.cos(phi);
    const cx = p0.x-T0.x*off, cy = p0.y-T0.y*off, cz = p0.z-T0.z*off;
    const capT0 = (i / capSegs) * 0.08; // キャップは 0~0.08 の範囲
    const rb = addRing(cx,cy,cz, N0.x,N0.y,N0.z, B0.x,B0.y,B0.z,
                       ringR, phi, -T0.x,-T0.y,-T0.z, capT0);
    connectRings(prevRing, rb);
    prevRing = rb;
  }

  // ── チューブ本体 ─────────────────────────────────────────────────
  let prevBodyRing = prevRing;
  for (let i = 1; i <= tubeSeg; i++) {
    const t  = i / tubeSeg;
    const p  = curve.getPoint(t);
    const Ni = frames.normals[i], Bi = frames.binormals[i];
    const bodyT = 0.08 + (i / tubeSeg) * 0.84; // 本体は 0.08~0.92
    const rb = addRing(p.x,p.y,p.z, Ni.x,Ni.y,Ni.z, Bi.x,Bi.y,Bi.z,
                       r, Math.PI*0.5, 0,0,0, bodyT);
    connectRings(prevBodyRing, rb);
    prevBodyRing = rb;
  }

  // ── 終端キャップ: 赤道 → 極(縮退リング) ──────────────────────────
  const p1 = curve.getPoint(1);
  const T1 = frames.tangents[tubeSeg];
  const N1 = frames.normals[tubeSeg], B1 = frames.binormals[tubeSeg];

  prevRing = prevBodyRing;
  for (let i = 0; i <= capSegs; i++) { // i=0: phi=π/2（赤道コピー、法線=純放射状=本体と完全一致）
    const phi   = Math.PI*0.5 - (i / capSegs) * Math.PI*0.5;
    const ringR = r * Math.sin(phi);
    const off   = r * Math.cos(phi);
    const cx = p1.x+T1.x*off, cy = p1.y+T1.y*off, cz = p1.z+T1.z*off;
    const capT1 = 0.92 + (i / capSegs) * 0.08; // キャップは 0.92~1.0 の範囲
    const rb = addRing(cx,cy,cz, N1.x,N1.y,N1.z, B1.x,B1.y,B1.z,
                       ringR, phi, T1.x,T1.y,T1.z, capT1);
    connectRings(prevRing, rb);
    prevRing = rb;
  }
  // 極を縮退リングとして追加して閉じる（pole fan不要）
  const polePos1 = { x: p1.x+T1.x*r, y: p1.y+T1.y*r, z: p1.z+T1.z*r };
  let degRing1 = vi;
  for (let j = 0; j < radSeg; j++)
    addVertex(polePos1.x, polePos1.y, polePos1.z, T1.x, T1.y, T1.z, 1.0);
  connectRings(prevRing, degRing1);

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(pos), 3));
  geo.setAttribute('normal',   new THREE.Float32BufferAttribute(new Float32Array(nor), 3));
  geo.setAttribute('aT',       new THREE.Float32BufferAttribute(new Float32Array(aTbuf), 1));
  geo.setIndex(idx);
  return geo;
}

// ── ③ ぬめっと光沢 ShaderMaterial ────────────────────────────────
function _makeWetMat(color, stencilRef) {
  const c = new THREE.Color(color);
  return new THREE.ShaderMaterial({
    uniforms: {
      uColor:     { value: new THREE.Vector3(c.r, c.g, c.b) },
      uEmissive:  { value: 1.0 },
      uProjPos:   { value: Array.from({length: MAX_PROJ_LIGHTS}, () => new THREE.Vector3()) },
      uProjCol:   { value: Array.from({length: MAX_PROJ_LIGHTS}, () => new THREE.Vector3()) },
      uProjCount: { value: 0 },
      uTime:      { value: 0.0 },
      uDriftAmp:  { value: 0.0 },  // DRIFT/SPIN/RANDOM 標準動き（小振幅+Z）
      uWaveAmp:   { value: 0.0 },  // WAVE ボタン（大振幅・チューブ独立）
      uPhase:     { value: 0.0 },  // チューブごとのランダム位相
    },
    vertexShader: `
      attribute float aT;
      uniform   float uTime;
      uniform   float uDriftAmp;
      uniform   float uWaveAmp;
      uniform   float uPhase;
      varying   vec3  vNormal;
      varying   vec3  vViewDir;
      varying   vec3  vWorldNormal;
      varying   vec3  vWorldPos;
      void main() {
        // ── DRIFT標準動き: 小振幅XYZ、全チューブ共通位相 ──
        float dFreq = 5.0;
        float dX = sin(aT * dFreq + uTime * 1.2)         * 0.10 * uDriftAmp;
        float dY = sin(aT * dFreq + uTime * 0.9 + 1.1)   * 0.07 * uDriftAmp;
        float dZ = sin(aT * dFreq + uTime * 0.7 + 2.1)   * 0.12 * uDriftAmp;

        // ── WAVE: 大振幅XYZ、チューブごとに uPhase でズレ ──
        float wFreq = 6.28;
        float wX = sin(aT * wFreq + uTime * 1.4 + uPhase)         * 0.22 * uWaveAmp;
        float wY = sin(aT * wFreq + uTime * 1.0 + uPhase + 1.571) * 0.16 * uWaveAmp;
        float wZ = sin(aT * wFreq + uTime * 0.8 + uPhase + 3.14)  * 0.18 * uWaveAmp;

        vec3 displaced = position + vec3(dX + wX, dY + wY, dZ + wZ);

        vec4 worldPos = modelMatrix * vec4(displaced, 1.0);
        vWorldPos     = worldPos.xyz;
        vec4 mvPos    = viewMatrix * worldPos;
        vNormal       = normalize(normalMatrix * normal);
        vViewDir      = normalize(-mvPos.xyz);
        vWorldNormal  = normalize((modelMatrix * vec4(normal, 0.0)).xyz);
        gl_Position   = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      #define MAX_PROJ_LIGHTS 32
      uniform vec3  uColor;
      uniform float uEmissive;
      uniform vec3  uProjPos[MAX_PROJ_LIGHTS];
      uniform vec3  uProjCol[MAX_PROJ_LIGHTS];
      uniform int   uProjCount;
      varying vec3  vNormal;
      varying vec3  vViewDir;
      varying vec3  vWorldNormal;
      varying vec3  vWorldPos;

      // Wrap lighting: シリコンのソフトな拡散光（NVIDIAのSSS近似手法）
      // wrap=0.5でライトが側面・背面まで回り込む
      float wrapDiff(vec3 N, vec3 L, float wrap) {
        return max(0.0, (dot(N, L) + wrap) / (1.0 + wrap));
      }

      // Oren-Nayar近似: マット表面の粗さによる広い反射
      float orenNayar(vec3 N, vec3 L, vec3 V, float roughness) {
        float NdotL = max(0.0, dot(N, L));
        float NdotV = max(0.0, dot(N, V));
        float r2    = roughness * roughness;
        float A     = 1.0 - 0.5 * r2 / (r2 + 0.57);
        float B     = 0.45 * r2 / (r2 + 0.09);
        float ga    = dot(V - N * NdotV, L - N * NdotL);
        float maxNL = max(NdotL, NdotV);
        return NdotL * (A + B * max(0.0, ga) / (maxNL + 1e-4));
      }

      void main() {
        vec3 N = vNormal;
        vec3 V = vViewDir;

        vec3 L1 = normalize(vec3(0.3, 1.0, 0.7));
        vec3 L2 = normalize(vec3(-0.6, 0.2, -0.6));

        float diff1 = orenNayar(N, L1, V, 0.8);
        float diff2 = orenNayar(N, L2, V, 0.8) * 0.35;
        float wrap1 = wrapDiff(N, L1, 0.45);
        float wrap2 = wrapDiff(N, L2, 0.3) * 0.25;

        // ── 消灯状態: 暗い色付き樹脂 + 近くの点灯ストロークから色投影 ──
        float ambDiff = 0.10 + diff1 * 0.18 + diff2 * 0.06;
        vec3 colOff = uColor * ambDiff;

        // 点灯ストロークからの色投影（距離減衰）
        vec3 projLight = vec3(0.0);
        for (int i = 0; i < MAX_PROJ_LIGHTS; i++) {
          float lightOn = step(float(i) + 0.5, float(uProjCount));
          float d      = distance(vWorldPos, uProjPos[i]);
          float att    = max(0.0, 1.0 - d / 3.5);
          att = att * att;
          projLight += uProjCol[i] * att * lightOn * 0.18;
        }
        colOff += projLight;

        // ── 点灯状態: LED発光 + SSS + 飽和色 ────────────────────────
        float edgeGlow  = pow(1.0 - clamp(dot(N, V), 0.0, 1.0), 1.5) * 0.4;
        float lightSum  = uEmissive * 0.45
                        + (diff1 + diff2) * 0.82
                        + (wrap1 + wrap2) * 0.50
                        + edgeGlow * uEmissive;

        // 点灯時の彩度ブースト: uColorを飽和方向に押す
        // luminance成分を引いて純色に近づける
        float lum    = dot(uColor, vec3(0.299, 0.587, 0.114));
        vec3 satColor = mix(vec3(lum), uColor, 1.35); // 1.35倍飽和
        satColor = clamp(satColor, 0.0, 1.0);
        vec3 colOn  = satColor * lightSum;

        // 弱い広域スペキュラー（色付き）
        vec3 H1 = normalize(L1 + V);
        float sp = pow(clamp(dot(N, H1), 0.0, 1.0), 8.0) * 0.06;
        colOn += satColor * sp;

        // 消灯→点灯のブレンド（uEmissive 0.05=off, 1.0=on）
        float onFactor = clamp((uEmissive - 0.05) / 0.95, 0.0, 1.0);
        vec3 col = mix(colOff, colOn, onFactor);

        // 色相保存トーンマッピング
        float maxC = max(col.r, max(col.g, col.b));
        if (maxC > 1.0) col = col / maxC;

        gl_FragColor = vec4(col, 1.0);
      }
    `,
    transparent:         false,
    depthWrite:          true,
    side:                THREE.FrontSide,
    polygonOffset:       true,
    polygonOffsetFactor: -1,
    polygonOffsetUnits:  -1,
  });
}

// ── ④ グロー層（テーパーチューブ、depthTest:false） ───────────────
// ── グロー: カメラビルボード方式 ─────────────────────────────────
// 各断面に常にカメラを向くquadを配置 → どの角度からも均等なGaussianグロー
function _buildBillboardGlowGeo(curve, numBillboards) {
  const pos = new Float32Array(numBillboards * 4 * 3);
  const off = new Float32Array(numBillboards * 4 * 2);
  const idx = [];

  for (let i = 0; i < numBillboards; i++) {
    const t = i / Math.max(1, numBillboards - 1);
    const p = curve.getPoint(t);
    const base = i * 4;

    for (let k = 0; k < 4; k++) {
      pos[(base+k)*3]   = p.x;
      pos[(base+k)*3+1] = p.y;
      pos[(base+k)*3+2] = p.z;
    }
    // quad corners: (-1,-1)(1,-1)(1,1)(-1,1)
    off[(base)*2]   = -1; off[(base)*2+1]   = -1;
    off[(base+1)*2] =  1; off[(base+1)*2+1] = -1;
    off[(base+2)*2] =  1; off[(base+2)*2+1] =  1;
    off[(base+3)*2] = -1; off[(base+3)*2+1] =  1;

    idx.push(base, base+1, base+2, base, base+2, base+3);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('aOff',     new THREE.Float32BufferAttribute(off, 2));
  geo.setIndex(idx);
  return geo;
}

function _makeBillboardGlowShader(color, peak) {
  const c = new THREE.Color(color);
  return new THREE.ShaderMaterial({
    uniforms: {
      uColor:  { value: new THREE.Vector3(c.r, c.g, c.b) },
      uPeak:   { value: peak },
      uGlowR:  { value: 1.0 }, // ビルドで上書き
    },
    vertexShader: `
      attribute vec2 aOff;
      varying   vec2 vOff;
      uniform   float uGlowR;
      void main() {
        vOff = aOff;
        // eye空間でオフセット → 常にカメラ正面を向く
        vec4 eyePos = modelViewMatrix * vec4(position, 1.0);
        eyePos.xy += aOff * uGlowR;
        gl_Position = projectionMatrix * eyePos;
      }
    `,
    fragmentShader: `
      uniform vec3  uColor;
      uniform float uPeak;
      varying vec2  vOff;
      void main() {
        float r = length(vOff);
        if (r > 1.0) discard;           // 円形クリップ
        float a = uPeak * exp(-4.5 * r * r);
        if (a < 0.003) discard;
        gl_FragColor = vec4(uColor, a);
      }
    `,
    transparent: true,
    blending:    THREE.AdditiveBlending,
    depthWrite:  false,
    depthTest:   false,
    side:        THREE.DoubleSide,
  });
}

function _buildGlowLayers(grp, curve, segs, r, color) {
  const glowR  = r * 5.0;
  const nBills = Math.min(segs, 120);
  const geo    = _buildBillboardGlowGeo(curve, nBills);

  // 輝度の逆数 + 半径の逆数でpeakを補正
  // → 明るい色・太い線が飛びすぎず全色・全サイズで均等に見える
  const c      = new THREE.Color(color);
  const lum    = c.r * 0.299 + c.g * 0.587 + c.b * 0.114;
  const refR   = 0.15; // 基準半径
  const basePeak = 0.022;
  const peak   = basePeak * (refR / Math.max(0.05, r)) / Math.max(0.25, lum * 1.4);

  const mat  = _makeBillboardGlowShader(color, peak);
  mat.uniforms.uGlowR.value = glowR;
  grp.add(new THREE.Mesh(geo, mat));
  return [{ mat, base: peak }];
}

// ── ⑤ 全ストロークをチューブ化 ───────────────────────────────────
function _buildTubes3D() {
  _tubeGroup3d.traverse(c => {
    if (c.isMesh) { c.geometry?.dispose(); c.material?.dispose(); }
  });
  _tubeGroup3d.clear();
  _flickerGroups3d   = {};
  _colorGroups3d     = {};
  _colorSpeeds3d     = {};
  _projStrokeSamples = [];
  _wetMats3d         = [];

  _scene3d.background = new THREE.Color(bgColor);

  const seen = new Set(), usedColors = [];
  drawLog.forEach(e => {
    if (!seen.has(e.color)) { seen.add(e.color); usedColors.push(e.color); }
  });

  const n = usedColors.length;
  usedColors.forEach((color, ci) => {
    const grp = new THREE.Group();
    _tubeGroup3d.add(grp);
    _colorGroups3d[color] = grp;
    _colorSpeeds3d[color] = {
      zAmp:     0.5 + ci * 0.45,
      zFreq:    0.04 + ci * 0.025,
      tiltAmp:  0.025 + ci * 0.010,
      tiltFreq: 0.022 + ci * 0.015,
      // RANDOM モード用: XY面内のランダム回転軸 + ランダム方向
      randomAxis: new THREE.Vector3(
        Math.random() * 2 - 1,
        Math.random() * 2 - 1,
        Math.random() * 2 - 1
      ).normalize(),
      randomDir: Math.random() < 0.5 ? 1 : -1,
    };
  });

  let strokeCount = 0;

  usedColors.forEach(color => {
    const strokes = colorStrokes[color];
    if (!strokes?.length) return;
    const grp = _colorGroups3d[color];

    strokes.forEach(({ points, size }) => {
      if (!points || points.length < 3) return;

      // ① ダウンサンプル
      const step = Math.max(1, Math.ceil(points.length / 260));
      let samp = points.filter((_, i) => i % step === 0);
      if (samp[samp.length-1] !== points[points.length-1]) samp.push(points[points.length-1]);
      if (samp.length < 3) return;

      // ② 3D座標変換
      let pts3 = samp.map(p => _toV3(p.x, p.y, W, H));

      // ストロークごとにZオフセットを与えて物理的に前後分離 → 自然な立体交差
      // 黄金比分布: 連続する2ストロークが同じZにならず均等に分散する
      const zSpread = 2.0; // 全体のZ幅（世界座標）
      const zOffset = ((strokeCount * 0.618033988) % 1.0 - 0.5) * zSpread;
      pts3 = pts3.map(p => new THREE.Vector3(p.x, p.y, p.z + zOffset));

      // ① スムージング
      pts3 = _smoothPoints(pts3, 14);

      // ② 等弧長リサンプリング → 直径を均一に保つ
      const roughCurve = new THREE.CatmullRomCurve3(pts3, false, 'catmullrom', 0.5);
      const evenPts    = roughCurve.getSpacedPoints(Math.min(300, samp.length * 3));
      // リサンプル後にも追加スムージング → 残存する急角度・フレーム捩れを除去
      const smoothedPts = _smoothPoints(evenPts, 6);
      const curve      = new THREE.CatmullRomCurve3(smoothedPts, false, 'centripetal', 0.5);
      const segs  = Math.min(600, samp.length * 3);
      const r     = Math.max(0.07, (size * 0.5 / W) * SCENE_W_3D * 1.85);

      if (!_flickerGroups3d[color]) _flickerGroups3d[color] = [];

      // ④ ロッド本体（テーパーチューブ + ぬめっとシェーダー）
      const mat1 = _makeWetMat(color, usedColors.indexOf(color) + 1);
      const sRef = usedColors.indexOf(color) + 1;
      mat1.stencilWrite = true;
      mat1.stencilRef   = sRef;
      mat1.stencilFunc  = THREE.NotEqualStencilFunc;
      mat1.stencilZPass = THREE.ReplaceStencilOp;
      const geo1 = _buildTubeWithCaps(curve, segs, r, 36, 24);
      grp.add(new THREE.Mesh(geo1, mat1));
      _flickerGroups3d[color].push({ mat: mat1, kind: 'wet', base: 1.0 });

      // 投影ライト用: このストロークの4サンプル点を記録
      const samplePositions = [0.1, 0.35, 0.65, 0.9].map(t => curve.getPoint(t));
      const sc = new THREE.Color(color);
      _projStrokeSamples.push({ positions: samplePositions, color: sc, colorKey: color });
      // チューブごとにランダム位相を設定（WAVE時に独立した動きになる）
      mat1.uniforms.uPhase.value = Math.random() * Math.PI * 2;
      _wetMats3d.push({ mat: mat1, colorKey: color });

      // ⑤ グロー層
      const glowMats = _buildGlowLayers(grp, curve, segs, r, color);
      glowMats.forEach(({ mat, base }) => {
        _flickerGroups3d[color].push({ mat, kind: 'glow', base });
      });

      strokeCount++;
    });
  });

  const lbl = document.getElementById('label-3d-strokes');
  if (lbl) lbl.textContent = strokeCount + ' stroke' + (strokeCount === 1 ? '' : 's');
}

// ── SHINE アニメーション状態（NEONSから移植） ────────────────────
let _3dStep = 0, _3dFrame = 0, _3dSeq = [];
let _3dRandFade = 'linear', _3dRandStep = -1;

// SHINEシーケンスをshinePatternに従って構築
function _buildShineSeq() {
  const allColors = getUsedColors();
  const n = allColors.length;
  _3dSeq = [];
  if (!n) return;
  if (shinePattern === 1) {
    allColors.forEach(c => _3dSeq.push(new Set([c])));
  } else if (shinePattern === 2) {
    for (let i=0; i<n; i++) _3dSeq.push(new Set([allColors[i], allColors[(i+1)%n]]));
  } else { // pattern 3
    allColors.forEach(c => { const s = new Set(allColors); s.delete(c); _3dSeq.push(s); });
  }
  _3dStep = 0; _3dFrame = 0;
}

// fadeCurveをそのまま使用
function _fade3D(phase, step) {
  let curve = fadeCurve;
  if (curve === 'random') {
    if (step !== _3dRandStep) {
      const opts = ['linear','none','sin','ease'];
      _3dRandFade = opts[Math.floor(Math.random() * opts.length)];
      _3dRandStep = step;
    }
    curve = _3dRandFade;
  }
  switch(curve) {
    case 'none':   return phase < 0.5 ? 1 : 0;
    case 'linear': return 1 - phase;
    case 'sin':    return Math.sin(phase * Math.PI);
    case 'ease':   return phase < 0.5 ? 2*phase*phase : 1 - Math.pow(-2*phase+2,2)/2;
    default:       return 1 - phase;
  }
}

function _mul3D(inCur, inNext, phase, step) {
  const dim = 0.25;
  if ( inCur &&  inNext) return 0.94;
  if ( inCur && !inNext) return dim + (0.94 - dim) * Math.max(0, _fade3D(phase, step));
  if (!inCur &&  inNext) return dim + (0.94 - dim) * Math.max(0, _fade3D(1 - phase, step));
  return dim;
}

// flickerSpeedも完全に踏襲（2Dと同じ fpg() 計算）
function _flicker3D() {
  const S = _3dSeq.length;
  if (!S) return;
  const period  = Math.max(1, Math.round(50 * Math.pow(1 - flickerSpeed / 100, 1.4)));
  const phase   = _3dFrame / period;
  const curSet  = _3dSeq[_3dStep];
  const nextSet = _3dSeq[(_3dStep + 1) % S];

  // 点灯中ストロークのサンプル位置・色を収集してライトuniformを更新
  let projCount = 0;
  _projStrokeSamples.forEach(({ positions, color: sc, colorKey }) => {
    const mul = _mul3D(curSet.has(colorKey), nextSet.has(colorKey), phase, _3dStep);
    const t   = Math.max(0, (mul - 0.25) / 0.75);
    if (t > 0.1) { // 点灯中のみライトとして寄与
      positions.forEach(pos => {
        if (projCount < MAX_PROJ_LIGHTS) {
          _projPosArr[projCount*3]   = pos.x;
          _projPosArr[projCount*3+1] = pos.y;
          _projPosArr[projCount*3+2] = pos.z;
          _projColArr[projCount*3]   = sc.r * t;
          _projColArr[projCount*3+1] = sc.g * t;
          _projColArr[projCount*3+2] = sc.b * t;
          projCount++;
        }
      });
    }
  });
  // 全wetマテリアルにライトを適用
  _wetMats3d.forEach(({ mat }) => {
    for (let i = 0; i < projCount; i++) {
      mat.uniforms.uProjPos.value[i].set(_projPosArr[i*3], _projPosArr[i*3+1], _projPosArr[i*3+2]);
      mat.uniforms.uProjCol.value[i].set(_projColArr[i*3], _projColArr[i*3+1], _projColArr[i*3+2]);
    }
    mat.uniforms.uProjCount.value = projCount;
  });

  Object.keys(_flickerGroups3d).forEach(color => {
    const mul = _mul3D(curSet.has(color), nextSet.has(color), phase, _3dStep);
    _flickerGroups3d[color].forEach(({ mat, kind, base }) => {
      if (kind === 'wet') {
        const t = Math.max(0, (mul - 0.25) / 0.75);
        mat.uniforms.uEmissive.value = 0.05 + 0.95 * t;
      }
      if (kind === 'glow') {
        // グローは消灯時ゼロ、点灯時だけ表示
        const t = Math.max(0, (mul - 0.25) / 0.75);
        // ShaderMaterialはuPeakで制御、MeshBasicMaterialはopacityで制御
        if (mat.uniforms) mat.uniforms.uPeak.value = base * t;
        else mat.opacity = base * t;
      }
    });
  });

  if (++_3dFrame >= period) {
    _3dFrame = 0;
    _3dStep  = (_3dStep + 1) % S;
  }
}

// ── レンダラー初期化（初回のみ） ─────────────────────────────────
function _init3DRenderer() {
  const canvas3d = document.getElementById('canvas-3d');
  const overlay  = document.getElementById('view-3d');
  const W3 = overlay.clientWidth  || window.innerWidth;
  const H3 = overlay.clientHeight || window.innerHeight;

  _renderer3d = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true, preserveDrawingBuffer: true, stencil: true });
  _renderer3d.setPixelRatio(Math.min(devicePixelRatio, 2));
  _renderer3d.setSize(W3, H3);

  _scene3d  = new THREE.Scene();
  _camera3d = new THREE.PerspectiveCamera(48, W3 / H3, 0.01, 500);
  _camera3d.position.set(0, 0, 22);

  // ライティング（ぬめっと光沢向け: フレネル・スペキュラーをシェーダー内計算）
  // シェーダーが独自にライト計算するためThree.jsライトは最小限
  _scene3d.add(new THREE.AmbientLight(0x050508));

  _controls3d = new THREE.OrbitControls(_camera3d, canvas3d);
  _controls3d.enableDamping   = true;
  _controls3d.dampingFactor   = 0.055;
  _controls3d.autoRotate      = _autoRotate3d;
  _controls3d.autoRotateSpeed = 0.42;
  _controls3d.minDistance     = 3;
  _controls3d.maxDistance     = 60;

  _tubeGroup3d = new THREE.Group();
  _scene3d.add(_tubeGroup3d);

  window.addEventListener('resize', () => {
    if (!_3dOpen) return;
    const w = overlay.clientWidth, h = overlay.clientHeight;
    _camera3d.aspect = w / h;
    _camera3d.updateProjectionMatrix();
    _renderer3d.setSize(w, h);
  });
}

// ── レンダーループ ───────────────────────────────────────────────
// ── モーションモード ─────────────────────────────────────────────
// 0: STILL（個別動きなし、全体オービットのみ）
// 1: DRIFT（全体オービット＋個別Z浮遊・傾き）
// 2: SPIN （全体オービット＋個別Y軸回転）
let _3dMotionMode = 1;   // デフォルト: DRIFT
let _3dSpeedMul   = 1.0; // スピード倍率（スライダーで変更）

function set3DMotion(mode) {
  _3dMotionMode = mode;
  document.querySelectorAll('.mot-btn').forEach((b, i) => {
    b.classList.toggle('active', i === mode);
  });
  // STILL以外はオービット継続
  if (_controls3d) {
    _controls3d.autoRotate      = (mode !== 0);
    _controls3d.autoRotateSpeed = 0.42 * _3dSpeedMul;
  }
  // グループ変換リセット（RANDOMはquaternion使用のためrotationもリセット）
  Object.values(_colorGroups3d).forEach(grp => {
    grp.position.set(0, 0, 0);
    grp.rotation.set(0, 0, 0);
    grp.quaternion.identity();
  });
}

function _animate3D() {
  _3dAnimId = requestAnimationFrame(_animate3D);
  const t = performance.now() / 1000 * _3dSpeedMul;

  if (_3dMotionMode === 1) {
    // DRIFT: Z前後浮遊 + XY微傾き
    Object.entries(_colorGroups3d).forEach(([color, grp]) => {
      const sp = _colorSpeeds3d[color];
      if (!sp) return;
      grp.position.z = sp.zAmp    * Math.sin(t * sp.zFreq    * Math.PI * 2);
      grp.rotation.y = sp.tiltAmp * Math.sin(t * sp.tiltFreq * Math.PI * 2);
      grp.rotation.x = sp.tiltAmp * 0.45 * Math.sin(t * sp.tiltFreq * 1.4 * Math.PI * 2);
    });
  } else if (_3dMotionMode === 2) {
    // SPIN: 色ごとに異なる速度でY軸回転
    Object.entries(_colorGroups3d).forEach(([color, grp]) => {
      const sp = _colorSpeeds3d[color];
      if (!sp) return;
      grp.rotation.y = t * sp.zFreq * Math.PI * 2;
      grp.rotation.x = sp.tiltAmp * Math.sin(t * sp.tiltFreq * Math.PI * 2);
    });
  } else if (_3dMotionMode === 3) {
    // RANDOM: XY軸ランダム方向・均等スピードで回転
    const baseSpeed = 0.5; // 全色共通のスピード（_3dSpeedMulで調整済みのtを使用）
    Object.entries(_colorGroups3d).forEach(([color, grp]) => {
      const sp = _colorSpeeds3d[color];
      if (!sp) return;
      const angle = t * baseSpeed * sp.randomDir;
      grp.quaternion.setFromAxisAngle(sp.randomAxis, angle);
    });
  }

  if (_controls3d) {
    _controls3d.autoRotateSpeed = 0.42 * _3dSpeedMul;
    _controls3d.update();
  }
  _flicker3D();

  // uTime / uDriftAmp / uWaveAmp を毎フレーム更新
  const rawT = performance.now() / 1000;
  // DRIFT/SPIN/RANDOM(mode 1-3) では標準動きON、STILLではOFF
  const driftTarget = (_3dMotionMode > 0) ? 1.0 : 0.0;
  const waveTarget  = _waveEnabled ? 1.0 : 0.0;
  _wetMats3d.forEach(({ mat }) => {
    mat.uniforms.uTime.value = rawT * _3dSpeedMul;
    const cd = mat.uniforms.uDriftAmp.value;
    mat.uniforms.uDriftAmp.value = cd + (driftTarget - cd) * 0.04;
    const cw = mat.uniforms.uWaveAmp.value;
    mat.uniforms.uWaveAmp.value  = cw + (waveTarget  - cw) * 0.04;
  });

  _renderer3d.clearStencil();
  _renderer3d.render(_scene3d, _camera3d);
}

// ── enter3D ─────────────────────────────────────────────────────
async function enter3D() {
  if (_3dOpen) return;

  const overlay = document.getElementById('view-3d');
  const loading = document.getElementById('loading-3d');
  const btn     = document.getElementById('btn-3d');

  // 他パネルを閉じる
  inputOpen = false; outputOpen = false; exportOpen = false;
  ['panel-input','panel-output','panel-export'].forEach(id =>
    document.getElementById(id).classList.remove('open'));
  ['btn-input','btn-output','btn-export'].forEach(id =>
    document.getElementById(id)?.classList.remove('on'));

  if (shining) stopShine();

  overlay.classList.add('open');
  loading.style.display = 'flex';
  btn.classList.add('on');
  _3dOpen = true;

  const ok = await _load3DLibs();
  if (!ok) {
    loading.textContent = 'LOAD FAILED — check connection';
    return;
  }

  if (!_renderer3d) _init3DRenderer();

  _buildTubes3D();
  _buildShineSeq();
  // モードボタンの初期表示を同期
  document.querySelectorAll('.mot-btn').forEach((b, i) => {
    b.classList.toggle('active', i === _3dMotionMode);
  });
  if (_controls3d) _controls3d.autoRotate = (_3dMotionMode !== 0);
  loading.style.display = 'none';
  _animate3D();
}

// ── exit3D ──────────────────────────────────────────────────────
function exit3D() {
  if (!_3dOpen) return;
  _3dOpen = false;
  if (_3dAnimId) { cancelAnimationFrame(_3dAnimId); _3dAnimId = null; }
  document.getElementById('view-3d').classList.remove('open');
  document.getElementById('btn-3d').classList.remove('on');
  if (glowApplied) { redrawAll(true); startShine(); }
}

// ── 3D エクスポート ───────────────────────────────────────────────
function _get3DExportSize() {
  const res = document.getElementById('sel-3d-res')?.value || 'screen';
  const canvas = document.getElementById('canvas-3d');
  // キャンバスのアスペクト比を維持
  const aspect = canvas.width / canvas.height;
  if (res === '4k')  return { w: Math.round(3840),              h: Math.round(3840 / aspect) };
  if (res === 'hd')  return { w: Math.round(1920),              h: Math.round(1920 / aspect) };
  return { w: canvas.width, h: canvas.height }; // screen
}

function export3DStill(type) {
  const { w, h } = _get3DExportSize();
  const canvas   = document.getElementById('canvas-3d');
  const origW    = canvas.width, origH = canvas.height;

  // 一時的にリサイズして高解像度レンダリング
  _renderer3d.setSize(w, h);
  _camera3d.aspect = w / h;
  _camera3d.updateProjectionMatrix();
  _renderer3d.render(_scene3d, _camera3d);

  const link = document.createElement('a');
  const ts   = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
  link.download = 'NEONS_3D_' + ts + '.' + type;
  link.href = canvas.toDataURL(type === 'jpg' ? 'image/jpeg' : 'image/png', 0.97);
  link.click();

  // 元に戻す
  _renderer3d.setSize(origW, origH);
  _camera3d.aspect = origW / origH;
  _camera3d.updateProjectionMatrix();
}

let _3dRecorder = null, _3dChunks = [];

function toggle3DMP4() {
  const btn = document.getElementById('btn-3d-mp4');
  if (_3dRecorder && _3dRecorder.state === 'recording') {
    _3dRecorder.stop();
    return;
  }

  const fps    = parseInt(document.getElementById('sel-3d-fps')?.value || 60);
  const { w, h } = _get3DExportSize();
  const canvas = document.getElementById('canvas-3d');
  const origW  = canvas.width, origH = canvas.height;

  // HD/4K解像度にリサイズしてからキャプチャ開始
  _renderer3d.setSize(w, h);
  _camera3d.aspect = w / h;
  _camera3d.updateProjectionMatrix();

  _3dChunks = [];
  const mime = [
    'video/mp4;codecs="avc1.42E01E"',
    'video/mp4;codecs="avc1"',
    'video/webm;codecs=vp9',
    'video/webm'
  ].find(m => { try { return MediaRecorder.isTypeSupported(m); } catch(e){ return false; }})
  || 'video/webm';

  // ビットレート: HD=20Mbps, 4K=60Mbps
  const isHD   = (w >= 1920);
  const is4K   = (w >= 3840);
  const bps    = is4K ? 60_000_000 : isHD ? 20_000_000 : 8_000_000;

  const stream = canvas.captureStream(fps);
  _3dRecorder  = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: bps });
  _3dRecorder.ondataavailable = e => { if(e.data.size) _3dChunks.push(e.data); };
  _3dRecorder.onstop = () => {
    // 元のサイズに戻す
    _renderer3d.setSize(origW, origH);
    _camera3d.aspect = origW / origH;
    _camera3d.updateProjectionMatrix();

    const ext  = mime.includes('mp4') ? 'mp4' : 'webm';
    const res  = is4K ? '_4K' : isHD ? '_HD' : '';
    const ts   = new Date().toISOString().slice(0,19).replace(/[:T]/g,'-');
    const blob = new Blob(_3dChunks, { type: mime });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.download = 'NEONS_3D' + res + '_' + ts + '.' + ext;
    a.href = url; a.click();
    URL.revokeObjectURL(url);
    if (btn) { btn.textContent = '↓ MP4'; btn.classList.remove('on'); }
    _3dRecorder = null;
  };
  _3dRecorder.start();
  if (btn) { btn.textContent = '● REC'; btn.classList.add('on'); }
  const sec = parseInt(document.getElementById('sel-3d-sec')?.value || 3);
  setTimeout(() => { if (_3dRecorder?.state === 'recording') _3dRecorder.stop(); }, sec * 1000);
}

function toggle3D() { _3dOpen ? exit3D() : enter3D(); }

function toggleWave() {
  _waveEnabled = !_waveEnabled;
  document.getElementById('btn-wave').classList.toggle('active', _waveEnabled);
}

function toggle3DAutoRotate() {
  // 後方互換（旧ボタンが残っていた場合用）
  set3DMotion(_3dMotionMode === 0 ? 1 : 0);
}


</script>
